<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verion Shop</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#0c0c11; --card:#15151d; --card2:#1d1d27; --line:#2a2a38;
  --txt:#f3f3f8; --mut:#8d8d9a; --acc:#7c5cff; --acc2:#9d7bff; --grad:linear-gradient(135deg,#7c5cff,#b487ff);
  --ok:#30d158; --warn:#ffd60a; --blue:#4da3ff; --err:#ff453a;
  --r:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.45;overflow-x:hidden;
  padding-bottom:calc(74px + env(safe-area-inset-bottom));
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;transition:transform .12s ease,opacity .12s ease}
button:active{transform:scale(.96)}
input,textarea{
  font:inherit;color:var(--txt);background:var(--card2);
  border:1px solid var(--line);border-radius:12px;padding:11px 13px;width:100%;outline:none;
  transition:border-color .15s;
}
input:focus,textarea:focus{border-color:var(--acc)}
label{display:block;font-size:12.5px;color:var(--mut);margin:12px 0 5px}
.hide{display:none!important}
img{max-width:100%}

/* error overlay */
#errbox{position:fixed;inset:auto 12px 94px 12px;z-index:9999;background:#3a1210;border:1px solid var(--err);
  border-radius:12px;padding:12px;font-size:12px;color:#ffb4ae;white-space:pre-wrap;word-break:break-word;
  display:none;max-height:40vh;overflow:auto;}

/* splash */
#splash{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;transition:opacity .45s ease;}
#splash.off{opacity:0;pointer-events:none}
#splash .slogo{width:86px;height:86px;border-radius:24px;background:var(--grad);display:flex;align-items:center;
  justify-content:center;font-size:42px;font-weight:800;color:#fff;
  box-shadow:0 12px 40px rgba(124,92,255,.45);animation:pulse 1.2s ease-in-out infinite;}
#splash .sname{font-size:20px;font-weight:800;letter-spacing:.02em}
#splash .sbar{width:120px;height:4px;border-radius:2px;background:var(--card2);overflow:hidden}
#splash .sbar i{display:block;height:100%;width:40%;border-radius:2px;background:var(--grad);animation:slide 1s linear infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes slide{0%{margin-left:-40%}100%{margin-left:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.screen{animation:fadeUp .22s ease}

/* header */
header{position:sticky;top:0;z-index:50;background:rgba(12,12,17,.85);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  padding:14px 16px 10px;border-bottom:1px solid var(--line);}
header h1{font-size:19px;font-weight:800;display:flex;align-items:center;gap:9px}
header .logo{width:28px;height:28px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;
  background:var(--grad);font-size:15px;font-weight:800;color:#fff;box-shadow:0 4px 14px rgba(124,92,255,.4)}
header .sub{font-size:12px;color:var(--mut);margin-top:2px}

/* tabs */
.tabs{display:flex;gap:8px;padding:12px 16px 4px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:9px 16px;border-radius:999px;background:var(--card);
  border:1px solid var(--line);font-size:13.5px;color:var(--mut);font-weight:700;}
.tab.on{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(124,92,255,.35)}

/* product grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 16px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;
  text-align:left;display:flex;flex-direction:column;box-shadow:0 6px 20px rgba(0,0,0,.25);}
.ptile{height:96px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:8px;position:relative;overflow:hidden;}
.ptile img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ptile .tl{font-size:17px;font-weight:800;position:relative;z-index:1;text-align:center;text-shadow:0 1px 6px rgba(0,0,0,.35)}
.ptile .ts{font-size:10.5px;opacity:.9;position:relative;z-index:1;text-align:center}
.pbody{padding:10px 12px 12px;display:flex;flex-direction:column;gap:6px;flex:1}
.pbody .nm{font-size:13.5px;font-weight:650;min-height:2.6em}
.pbody .ct{font-size:11px;color:var(--mut)}
.prow{display:flex;align-items:center;justify-content:space-between;margin-top:auto;gap:6px;flex-wrap:wrap}
.prc{font-size:14px;font-weight:800;color:var(--acc2)}
.stkb{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;background:rgba(48,209,88,.14);color:var(--ok);white-space:nowrap}
.stkb.out{background:rgba(255,69,58,.14);color:var(--err)}
.empty{padding:40px 20px;text-align:center;color:var(--mut);font-size:13.5px;grid-column:1/-1}

/* sheet */
.dim{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;opacity:0;transition:opacity .22s}
.dim.on{opacity:1}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:101;background:var(--card);
  border-radius:22px 22px 0 0;padding:10px 16px calc(20px + env(safe-area-inset-bottom));
  max-height:90vh;overflow-y:auto;transform:translateY(105%);transition:transform .28s cubic-bezier(.3,1,.4,1);}
.sheet.on{transform:translateY(0)}
.grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 12px}
.sheet h2{font-size:18px;font-weight:800;margin-bottom:2px}
.sheet .cat{font-size:12px;color:var(--mut);margin-bottom:10px}
.sheet .desc{font-size:14px;color:#cfcfda;margin:10px 0 14px;white-space:pre-wrap}
.bigtile{height:118px;border-radius:16px;margin-bottom:12px}

/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:14px;border-radius:14px;font-weight:800;font-size:15px;background:var(--grad);color:#fff;
  box-shadow:0 6px 20px rgba(124,92,255,.35);}
.btn.big{padding:17px;font-size:16.5px;border-radius:16px}
.btn.gray{background:var(--card2);border:1px solid var(--line);color:var(--txt);box-shadow:none}
.btn.red{background:transparent;border:1px solid var(--err);color:var(--err);box-shadow:none}
.btn.green{background:linear-gradient(135deg,#1fa74a,#30d158)}
.btn:disabled{opacity:.4;box-shadow:none}
.btn.sm{width:auto;padding:8px 14px;font-size:13px;border-radius:11px}

/* cards & rows */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin:0 16px 12px;
  padding:14px 16px;box-shadow:0 6px 20px rgba(0,0,0,.2);}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .l{font-size:14px;font-weight:600}
.row .l .d{font-size:11.5px;color:var(--mut);margin-top:2px;font-weight:400}
.row .r{font-size:13px;color:var(--mut);text-align:right}
.sect{font-size:12px;font-weight:800;letter-spacing:.08em;color:var(--mut);margin:18px 16px 8px;text-transform:uppercase}
.badge{font-size:10.5px;padding:4px 10px;border-radius:999px;font-weight:800;white-space:nowrap}
.badge.ok{background:rgba(48,209,88,.14);color:var(--ok)}
.badge.pend{background:rgba(255,214,10,.14);color:var(--warn)}
.badge.chk{background:rgba(77,163,255,.14);color:var(--blue)}
.badge.cncl{background:rgba(255,69,58,.14);color:var(--err)}
.code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:var(--card2);
  border:1px dashed var(--acc);border-radius:8px;padding:2px 8px;font-size:12.5px;color:var(--acc2);}
.toast{position:fixed;left:50%;bottom:calc(88px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
  background:#26262f;border:1px solid var(--line);color:var(--txt);padding:11px 18px;border-radius:13px;
  font-size:13.5px;z-index:600;opacity:0;transition:all .25s;max-width:86vw;text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.45);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* bottom nav */
nav{position:fixed;left:0;right:0;bottom:0;z-index:60;display:flex;
  background:rgba(17,17,24,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--line);padding:7px 0 calc(7px + env(safe-area-inset-bottom));}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;
  color:var(--mut);font-size:10.5px;font-weight:700;}
nav button.on{color:var(--acc2)}
nav button svg{width:22px;height:22px}

/* onboarding */
#onb{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;text-align:center}
#onb .biglogo{width:80px;height:80px;border-radius:24px;background:var(--grad);display:flex;align-items:center;
  justify-content:center;font-size:38px;font-weight:800;color:#fff;margin-bottom:18px;
  box-shadow:0 12px 40px rgba(124,92,255,.45)}
#onb h1{font-size:25px;margin-bottom:6px}
#onb p{color:var(--mut);font-size:14px;margin-bottom:26px}
#onb .langs{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
#onb .langs button{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:15px;padding:15px 18px;font-size:15px;font-weight:700;}
#onb .langs .fl{font-size:22px}

/* pay screen */
.paybox{margin:0 16px 12px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:16px;box-shadow:0 6px 20px rgba(0,0,0,.2);}
.amount{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--line);
  border-radius:13px;padding:4px 14px 4px 4px;}
.amount input{border:none;background:transparent;font-size:19px;font-weight:800;padding:11px}
.amount .cur{color:var(--mut);font-size:14px;font-weight:700}
.minnote{font-size:11.5px;color:var(--mut);margin-top:7px}
.chips{display:flex;gap:8px;margin-top:11px}
.chips button{flex:1;padding:10px 4px;border-radius:12px;background:var(--card2);border:1px solid var(--line);
  font-size:13px;font-weight:700;color:var(--mut);}
.chips button.on{border-color:var(--acc);color:var(--acc2);background:rgba(124,92,255,.1)}
.methods{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.method{display:flex;align-items:center;gap:9px;padding:13px 12px;border-radius:13px;background:var(--card2);
  border:1px solid var(--line);text-align:left;}
.method .ic{font-size:18px}
.method .mn{font-size:13px;font-weight:800}
.method .md{font-size:10.5px;color:var(--mut)}
.method.on{border-color:var(--acc);background:rgba(124,92,255,.1);box-shadow:0 0 0 1px var(--acc)}
.method.dis{opacity:.42}
.cardbox{margin-top:14px;background:var(--grad);border-radius:16px;padding:16px;color:#fff;
  box-shadow:0 10px 30px rgba(124,92,255,.35);animation:fadeUp .25s ease}
.cardbox .cnum{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:19px;font-weight:800;letter-spacing:.04em}
.cardbox .chold{font-size:12.5px;opacity:.9;margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
.cardbox .crow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.cardbox .cpy{background:rgba(255,255,255,.18);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:800;color:#fff}
.paynote{font-size:12.5px;color:var(--mut);margin:12px 0;line-height:1.55}
.refline{display:flex;align-items:center;justify-content:space-between;background:var(--card2);
  border:1px solid var(--line);border-radius:12px;padding:10px 13px;margin-top:10px;font-size:13px}

/* balance card */
.balcard{margin:12px 16px;background:linear-gradient(135deg,#2743ff,#7c5cff);border-radius:20px;padding:18px;
  color:#fff;box-shadow:0 10px 30px rgba(60,70,255,.35);animation:fadeUp .22s ease}
.balcard .bl{font-size:12px;opacity:.85;font-weight:700}
.balcard .bv{font-size:29px;font-weight:800;margin-top:2px}
.balcard .brow{display:flex;gap:10px;margin-top:14px}
.balcard .brow button{flex:1;background:rgba(255,255,255,.16);border-radius:12px;padding:11px 6px;
  font-weight:800;color:#fff;font-size:13px;border:1px solid rgba(255,255,255,.14)}
.payhuge{font-size:30px;font-weight:800;color:var(--acc2);letter-spacing:.02em}
.rule{display:flex;gap:8px;font-size:12.5px;padding:4px 0;color:var(--mut)}
.rule.bad{color:#ff8f88}
.timer{font-family:ui-monospace,Menlo,monospace;font-size:16px;font-weight:800;color:var(--warn)}

/* profile */
.avatar{width:56px;height:56px;border-radius:50%;background:var(--grad);display:flex;align-items:center;
  justify-content:center;font-size:22px;font-weight:800;color:#fff;overflow:hidden;flex:0 0 auto}
.avatar img{width:100%;height:100%;object-fit:cover}
.prof{display:flex;align-items:center;gap:13px}
.stats{display:flex;gap:10px;margin:0 16px 12px}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px;text-align:center}
.stat .v{font-size:17px;font-weight:800;color:var(--acc2)}
.stat .k{font-size:11px;color:var(--mut);margin-top:3px}

/* admin */
.colors{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.arow{display:flex;gap:8px}
.arow>*{flex:1}
.itemrow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 0;border-bottom:1px solid var(--line)}
.itemrow:last-child{border-bottom:none}
.itemrow .nm{font-size:13.5px;font-weight:600}
.itemrow .meta{font-size:11px;color:var(--mut)}
.itemrow .acts{display:flex;gap:6px}
.itemrow .acts button{padding:7px 9px;border-radius:9px;background:var(--card2);border:1px solid var(--line);font-size:13px}
.itemrow.offi .nm{opacity:.45;text-decoration:line-through}
.seg{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:3px;flex-wrap:wrap}
.seg button{flex:1;padding:8px 4px;border-radius:9px;font-size:12px;font-weight:700;color:var(--mut);min-width:70px}
.seg button.on{background:var(--acc);color:#fff}
.switch{display:flex;align-items:center;justify-content:space-between;padding:11px 0}
.swbtn{width:46px;height:27px;border-radius:999px;background:var(--card2);border:1px solid var(--line);position:relative}
.swbtn i{position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:var(--mut);transition:all .18s}
.swbtn.on{background:var(--acc);border-color:var(--acc)}
.swbtn.on i{left:21px;background:#fff}
.exta{font-family:ui-monospace,Menlo,monospace;font-size:11px;min-height:90px}
</style>
</head>
<body>
<div id="splash"><div class="slogo">V</div><div class="sname">Verion Shop</div><div class="sbar"><i></i></div></div>
<div id="errbox"></div>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
"use strict";
/* ===== visible errors, never a black screen ===== */
(function(){
  function show(msg){try{var b=document.getElementById("errbox");if(!b)return;b.style.display="block";b.textContent="⚠️ App error:\n"+msg;}catch(e){}}
  window.addEventListener("error",function(e){show((e.message||"unknown")+(e.filename?"\n"+e.filename+":"+e.lineno:""));});
  window.addEventListener("unhandledrejection",function(e){show("Promise: "+(e.reason&&e.reason.message?e.reason.message:String(e.reason)));});
})();

/* ===== CONFIG ===== */
var SUPPORT_USERNAME="verionshop_support";
var SHOW_VIDEO_ROW=false;             /* set true + put link below when video is ready */
var VIDEO_URL="";
var MIN_AMOUNT=1000;
var CARDS=[
  {id:"humo",  name:"HUMO",  number:"9860 1966 1864 6182", holder:"Asatullayev Shaxzod", icon:"💳", enabled:true},
  {id:"uzcard",name:"UZCARD",number:"5614 6873 0780 6340", holder:"Asatullayev Shaxzod", icon:"💳", enabled:true},
  {id:"bank",  name:"BANKOMAT", number:"", holder:"", icon:"🏧", enabled:false},
  {id:"intl",  name:"INTERNATIONAL", number:"", holder:"", icon:"🌐", enabled:false}
];
/* ============================================================
   ADMIN ACCESS — EDIT THIS LINE
   Telegram IDs of admins, comma separated.
   ============================================================ */
var ADMIN_IDS=[5606872249, 8684274899];

/* ===== Telegram init (guarded) ===== */
var TG=null;
try{
  if(window.Telegram&&window.Telegram.WebApp){
    TG=window.Telegram.WebApp;
    TG.ready();TG.expand();
    if(TG.setHeaderColor)TG.setHeaderColor("#0c0c11");
    if(TG.setBackgroundColor)TG.setBackgroundColor("#0c0c11");
    if(TG.disableVerticalSwipes)TG.disableVerticalSwipes();
  }
}catch(e){}
function haptic(kind){try{if(TG&&TG.HapticFeedback){kind==="ok"?TG.HapticFeedback.notificationOccurred("success"):TG.HapticFeedback.impactOccurred("light");}}catch(e){}}
function tgUser(){try{var u=TG&&TG.initDataUnsafe&&TG.initDataUnsafe.user;return u||null;}catch(e){return null;}}
function isAdmin(){if(!ADMIN_IDS||ADMIN_IDS.length===0)return true;var u=tgUser();return !!u&&ADMIN_IDS.indexOf(u.id)!==-1;}
function openLink(url){try{if(TG&&TG.openTelegramLink&&url.indexOf("https://t.me/")===0){TG.openTelegramLink(url);return;}}catch(e){}try{window.open(url,"_blank");}catch(e){}}

/* ===== safe storage ===== */
var Store=(function(){
  var mem={},usable=false;
  try{localStorage.setItem("__t","1");localStorage.removeItem("__t");usable=true;}catch(e){}
  return{
    get:function(k,d){try{if(usable){var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}}catch(e){}return (k in mem)?mem[k]:d;},
    set:function(k,v){mem[k]=v;try{if(usable)localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
  };
})();

/* ===== i18n EN ===== */
var I18N={
en:{
  shop_sub:"Digital goods · fast delivery",
  nav_home:"Home",nav_orders:"Orders",nav_pay:"Payment",nav_profile:"Profile",
  tab_obuna:"Subscriptions",tab_promokod:"Promo codes",tab_telegram:"Telegram",tab_products:"Products",
  buy:"Buy now",in_stock:"in stock",out_stock:"Out of stock",empty_section:"Nothing here yet.",
  open_in_tg:"Open in Telegram to buy",order_created:"Order created — now pay",
  pay_title:"Payment",enter_amount:"Enter amount",min_note:"Minimum: 1 000 sum",pay_method:"Payment method",
  soon:"Coming soon",card_transfer:"Card transfer",terminal:"Via terminal",visa_mc:"Visa / Mastercard",
  copy:"Copy",copied:"Copied",send_receipt:"Send receipt",order_ref:"Order ID",pay_for:"Paying for",
  paynote:"Transfer the exact amount to the card above, take a screenshot of the receipt, then press “Send receipt” — the chat opens with your Order ID, attach the screenshot there.",
  cancel_order:"Cancel order",cancelled_toast:"Order cancelled",amount_low:"Amount is below the minimum",
  choose_method:"Choose a payment method",custom_pay:"Payment",
  orders_title:"My orders",orders_empty:"No orders yet.",
  st_pending:"Awaiting payment",st_checking:"Payment being checked",st_cancelled:"Cancelled",
  goto_pay:"Pay",resend:"Resend receipt",
  profile_title:"Profile",guest:"Guest",tg_user:"Telegram user",language:"Language",owner:"OWNER",
  support:"Support",support_sub:"Contact the operator",
  stat_orders:"Orders",stat_spent:"Total paid",
  a_panel:"Admin panel",a_panel_sub:"Products, catalog, export",a_new:"+ New product",
  a_section:"Section",a_title:"Title",a_category:"Category",a_price:"Price (sum)",a_stock:"Stock",
  a_label:"Tile label",a_sublabel:"Tile subtitle",a_bg:"Background",a_fg:"Text color",
  a_img:"Image from gallery",a_active:"Active (visible in store)",
  a_desc_en:"Description — English",a_desc_uz:"Description — Uzbek",a_desc_ru:"Description — Russian",
  a_preview:"Preview",a_save:"Save",a_add:"Add product",a_added:"Added ✓",a_saved:"Saved ✓",
  a_need:"Fill in title and price",a_del:"Delete",a_del_done:"Deleted",a_edit:"Edit",
  a_current:"Catalog",a_export:"Export catalog",a_export_hint:"Copy this JSON and send it to the developer — after re-upload every customer sees your changes.",
  a_import:"Import catalog",a_import_hint:"Paste a catalog JSON and press Import (syncs another admin's export).",
  a_import_done:"Catalog imported",a_import_bad:"Invalid JSON",a_copy:"Copy JSON",
  a_reset:"Reset to file defaults",a_reset_done:"Catalog reset",
  a_publish:"🌍 Publish — show to everyone",a_publish_hint:"Sends the current catalog to the server: every customer sees it immediately.",
  a_publish_ok:"Published — visible to everyone ✓",a_publish_err:"Publish failed — open via Telegram / check server",
  bal_title:"Balance",bal_topup:"Top up",bal_support:"Support",
  buy_confirm:"Confirm purchase",pay_from_balance:"Pay from balance",after_left:"Balance after",

<script>
"use strict";
/* ===== state ===== */
var S={
  lang:Store.get("vn_lang",null),
  screen:"home",
  tab:"obuna",
  orders:Store.get("vn_orders",[]),
  custom:Store.get("vn_custom",[]),     // admin-added items (this device)
  over:Store.get("vn_over",{}),         // admin edits to default items {id:patch}
  removed:Store.get("vn_removed",[]),   // deleted default ids
  imported:Store.get("vn_imported",null), // full imported catalog (overrides everything)
  serverCat:Store.get("vn_srv",null),    // catalog published on the server (shared with everyone)
  activePay:Store.get("vn_actpay",null), // current top-up payment window {id,pay,amount,method,expiresAt}
  topup:{amount:50000,method:null}
};
var ME={balance:null,payments:[],orders:[]}; // server account (loaded via /api/me)
function persist(){
  Store.set("vn_lang",S.lang);Store.set("vn_orders",S.orders);Store.set("vn_custom",S.custom);
  Store.set("vn_over",S.over);Store.set("vn_removed",S.removed);Store.set("vn_imported",S.imported);
  Store.set("vn_srv",S.serverCat);Store.set("vn_actpay",S.activePay);
}

/* ===== server api ===== */
function api(path,method,body){
  if(typeof fetch!=="function")return Promise.reject(new Error("nofetch"));
  var initData=(TG&&TG.initData)?TG.initData:"";
  return fetch(path,{method:method||"GET",
    headers:{"Content-Type":"application/json","X-Init-Data":initData},
    body:body?JSON.stringify(body):undefined})
  .then(function(r){return r.json().then(function(j){j.__code=r.status;if(!r.ok){var e=new Error("http");e.resp=j;throw e;}return j;});});
}
function loadMe(cb){
  if(!tgUser()||typeof fetch!=="function"){if(cb)cb();return;}
  api("/api/me").then(function(r){
    ME={balance:r.balance,payments:r.payments||[],orders:r.orders||[]};
    if(cb)cb();else if(S.lang)render();
  }).catch(function(){if(cb)cb();});
}

/* ===== catalog ===== */
function baseCatalog(){
  if(S.serverCat&&S.serverCat.length)return S.serverCat;
  return DEFAULT_CATALOG;
}
function catalog(){
  if(S.imported&&S.imported.length)return S.imported;
  var BASE=baseCatalog();
  var out=[];
  for(var i=0;i<BASE.length;i++){
    var it=BASE[i];
    if(S.removed.indexOf(it.id)!==-1)continue;
    var copy=JSON.parse(JSON.stringify(it));
    var p=S.over[it.id];
    if(p)for(var k in p){if(k==="tile"){for(var tk in p.tile)copy.tile[tk]=p.tile[tk];}else copy[k]=p[k];}
    out.push(copy);
  }
  for(var j=0;j<S.custom.length;j++)out.push(S.custom[j]);
  return out;
}
function byId(id){var c=catalog();for(var i=0;i<c.length;i++)if(c[i].id===id)return c[i];return null;}
function activeItems(kind){return catalog().filter(function(x){return x.kind===kind&&x.active!==false;});}

/* ===== helpers ===== */
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function money(n){n=Number(n)||0;return n.toLocaleString("ru-RU").replace(/,/g," ")+" so'm";}
function loc(v){if(v==null)return"";if(typeof v==="string")return v;return v[S.lang]||v.uz||v.en||v.ru||"";}
function orderId(){var a="ABCDEFGHJKMNPQRSTUVWXYZ23456789",s="";for(var i=0;i<6;i++)s+=a.charAt(Math.floor(Math.random()*a.length));return "VN-"+s;}
function toast(msg){var el=document.getElementById("toast");el.textContent=msg;el.classList.add("on");clearTimeout(toast._t);toast._t=setTimeout(function(){el.classList.remove("on");},2200);}
function tgName(){var u=tgUser();return u?(u.first_name||"")+(u.last_name?" "+u.last_name:""):null;}
function copyText(txt){
  var done=function(){toast(t("copied"));haptic("ok");};
  try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done,function(){});return;}}catch(e){}
  try{var ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();done();}catch(e){}
}
function fmtDate(ts){var d=new Date(ts);return d.toLocaleDateString()+" "+("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);}
function initials(){var n=tgName();if(!n)return "👤";var p=n.trim().split(/\s+/);return (p[0][0]||"")+(p[1]?p[1][0]:"");}

function render(){

  else if(S.screen === "pay") html += payHTML();
  else html += profileHTML();
  html += '</div>' + navHTML();
  app.innerHTML = html;
  bind();
}

    S.activePay={id:r.payment.id,pay:r.payment.pay,amount:r.payment.amount,method:r.payment.method,expiresAt:r.expiresAt};
    persist();haptic("ok");toast(t("topup_created"));render();
  }).catch(function(){toast(t("srv_off"));});

function markPaid(){
  var ap=S.activePay;if(!ap)return;
  api("/api/paid","POST",{id:ap.id}).then(function(){
    S.activePay=null;persist();haptic("ok");
    loadMe(function(){go("orders");});
  }).catch(function(){
    S.activePay=null;persist();loadMe(function(){go("orders");});
  });
}
function tickTimer(){
  var ap=S.activePay;if(!ap)return;
  var el=document.getElementById("pwTimer");
  var left=Math.floor((ap.expiresAt-Date.now())/1000);
  if(left<=0){S.activePay=null;persist();toast(t("pw_expired"));if(S.screen==="pay")render();return;}
  if(el)el.textContent=("0"+Math.floor(left/60)).slice(-2)+":"+("0"+(left%60)).slice(-2);
}

  }

    var id=this.getAttribute("data-atoggle"),it=byId(id);if(!it)return;
    patchItem(id,{active:it.active===false});
    persist();renderAdminList(sh);render();
  });
  var dls=sh.querySelectorAll("[data-adel]");
  for(var d=0;d<dls.length;d++)dls[d].addEventListener("click",function(){
    var id=this.getAttribute("data-adel");
    deleteItem(id);persist();toast(t("a_del_done"));haptic();renderAdminList(sh);render();
  });

function isCustom(id){for(var i=0;i<S.custom.length;i++)if(S.custom[i].id===id)return true;return false;}
function patchItem(id,patch){
  if(S.imported){for(var i=0;i<S.imported.length;i++)if(S.imported[i].id===id){for(var k in patch)S.imported[i][k]=patch[k];}return;}
  if(isCustom(id)){for(var j=0;j<S.custom.length;j++)if(S.custom[j].id===id){for(var k2 in patch)S.custom[j][k2]=patch[k2];}return;}
  var p=S.over[id]||{};for(var k3 in patch)p[k3]=patch[k3];S.over[id]=p;
}
function deleteItem(id){
  if(S.imported){S.imported=S.imported.filter(function(x){return x.id!==id;});return;}
  if(isCustom(id)){S.custom=S.custom.filter(function(x){return x.id!==id;});return;}
  if(S.removed.indexOf(id)===-1)S.removed.push(id);
}

    +'<div class="sect" style="margin:16px 0 8px">'+esc(t("adm_orders_p"))+'</div><div id="amOrd">…</div>'
    +'<div class="sect" style="margin:16px 0 8px">'+esc(t("adm_search"))+'</div>'
    +'<div class="arow"><input id="admQ" placeholder="ID / @username"><button class="btn sm" id="admFind">'+esc(t("adm_find"))+'</button></div>'
    +'<div id="admRes" style="margin-top:10px"></div>');
  function reload(){
    api("/api/admin/list").then(function(r){
      var hp="";
      for(var i=0;i<r.payments.length;i++){
        var p=r.payments[i];
        hp+='<div class="itemrow"><div><div class="nm">'+esc(money(p.pay))+' · '+esc(p.method||"")+'</div>'
          +'<div class="meta">'+(p.uname?'@'+esc(p.uname)+' · ':'')+'ID '+esc(p.uid)+' · '+esc(fmtDate(p.ts))+' · '+esc(t(PAY_BADGE[p.status][1]))+'</div></div>'
          +'<div class="acts"><button data-apc="'+esc(p.id)+'">✅</button><button data-apx="'+esc(p.id)+'">❌</button></div></div>';
      }
      sh.querySelector("#amPay").innerHTML=hp||'<div class="paynote">'+esc(t("adm_none"))+'</div>';
      var ho="";
      for(var j=0;j<r.orders.length;j++){
        var o=r.orders[j];
        ho+='<div class="itemrow"><div><div class="nm">'+esc(o.item)+' · '+esc(money(o.price))+'</div>'
          +'<div class="meta">'+(o.uname?'@'+esc(o.uname)+' · ':'')+'ID '+esc(o.uid)+' · <span class="code">'+esc(o.id)+'</span></div></div>'
          +'<div class="acts"><button data-aoc="'+esc(o.id)+'">✅</button><button data-aox="'+esc(o.id)+'">❌</button></div></div>';
      }
      sh.querySelector("#amOrd").innerHTML=ho||'<div class="paynote">'+esc(t("adm_none"))+'</div>';
      function wire(sel,fn){var els=sh.querySelectorAll(sel);for(var k=0;k<els.length;k++)els[k].addEventListener("click",fn);}
      wire("[data-apc]",function(){payAct(this.getAttribute("data-apc"),"confirm");});
      wire("[data-apx]",function(){payAct(this.getAttribute("data-apx"),"cancel");});
      wire("[data-aoc]",function(){ordAct(this.getAttribute("data-aoc"),"done");});
      wire("[data-aox]",function(){ordAct(this.getAttribute("data-aox"),"cancel");});
    }).catch(function(){sh.querySelector("#amPay").innerHTML='<div class="paynote">'+esc(t("srv_off"))+'</div>';});
  }
  function payAct(id,action){api("/api/admin/payment","POST",{id:id,action:action}).then(function(){toast(t("adm_done"));haptic("ok");reload();}).catch(function(){toast(t("srv_off"));});}
  function ordAct(id,action){api("/api/admin/order","POST",{id:id,action:action}).then(function(){toast(t("adm_done"));haptic("ok");reload();}).catch(function(){toast(t("srv_off"));});}
  sh.querySelector("#admFind").addEventListener("click",function(){
    var q=sh.querySelector("#admQ").value.trim();if(!q)return;
    api("/api/admin/user?q="+encodeURIComponent(q)).then(function(list){
      var h="";
      for(var i=0;i<list.length;i++){
        var u=list[i];
        h+='<div class="itemrow"><div><div class="nm">'+esc(u.name||"—")+(u.uname?' @'+esc(u.uname):'')+'</div>'
          +'<div class="meta">ID '+esc(u.uid)+' · '+esc(money(u.balance))+'</div></div></div>'
          +'<div class="arow" style="margin:6px 0 12px"><input type="number" inputmode="numeric" placeholder="'+esc(t("adm_amountph"))+'" data-amt="'+u.uid+'">'
          +'<button class="btn sm green" data-badd="'+u.uid+'">＋</button><button class="btn sm red" data-bsub="'+u.uid+'">−</button></div>';
      }
      sh.querySelector("#admRes").innerHTML=h||'<div class="paynote">'+esc(t("adm_none"))+'</div>';
      function adj(uid,sign){
        var inp=sh.querySelector('[data-amt="'+uid+'"]');
        var v=Math.round(Number(inp&&inp.value)||0);
        if(!v)return;
        api("/api/admin/balance","POST",{uid:Number(uid),delta:sign*v}).then(function(){toast(t("adm_done"));haptic("ok");sh.querySelector("#admFind").click();}).catch(function(){toast(t("srv_off"));});
      }
      var ad=sh.querySelectorAll("[data-badd]");for(var a=0;a<ad.length;a++)ad[a].addEventListener("click",function(){adj(this.getAttribute("data-badd"),1);});
      var su=sh.querySelectorAll("[data-bsub]");for(var s=0;s<su.length;s++)su[s].addEventListener("click",function(){adj(this.getAttribute("data-bsub"),-1);});
    }).catch(function(){toast(t("srv_off"));});
  });
  reload();
}

/* ===== shared catalog: publish + load ===== */
function publishCatalog(){
  var initData=(TG&&TG.initData)?TG.initData:"";
  if(!initData||typeof fetch!=="function"){toast(t("a_publish_err"));return;}
  var arr=catalog();
  fetch("/api/catalog",{method:"POST",
    headers:{"Content-Type":"application/json","X-Init-Data":initData},
    body:JSON.stringify(arr)})
  .then(function(r){if(!r.ok)throw 0;return r.json();})
  .then(function(){
    S.serverCat=arr;S.custom=[];S.over={};S.removed=[];S.imported=null;
    persist();haptic("ok");toast(t("a_publish_ok"));closeSheet();S.screen="home";render();
  })
  .catch(function(){toast(t("a_publish_err"));});
}
function loadServerCatalog(){
  try{
    if(typeof fetch!=="function")return;
    fetch("/api/catalog",{cache:"no-store"})
    .then(function(r){if(!r.ok)throw 0;return r.json();})
    .then(function(arr){
      if(Array.isArray(arr)&&arr.length){S.serverCat=arr;persist();if(S.lang)render();}
    })
    .catch(function(){});
  }catch(e){}
}
</script>
<script>
"use strict";
/* ===== admin form (add / edit) ===== */
function openAdminForm(editId){
  var it=editId?byId(editId):null;
  var F={
    id:it?it.id:null, kind:it?it.kind:"product",
    title:it?loc(it.title):"", cat:it?(it.cat||""):"",
    price:it?it.price:"", stock:it?it.stock:10,
    label:it?(it.tile&&it.tile.label||""):"NEW", sub:it?(it.tile&&it.tile.sub||""):"",
    bg:it?(it.tile&&it.tile.bg||"#2b1a5e"):"#2b1a5e", fg:it?(it.tile&&it.tile.fg||"#ffffff"):"#ffffff",
    img:it?(it.tile&&it.tile.img||""):"",
    den:it?(it.desc&&(typeof it.desc==="string"?it.desc:it.desc.en)||""):"",
    duz:it?(it.desc&&(typeof it.desc==="string"?it.desc:it.desc.uz)||""):"",
    dru:it?(it.desc&&(typeof it.desc==="string"?it.desc:it.desc.ru)||""):"",
    active:it?it.active!==false:true
  };
  function kindBtn(k,key){return '<button data-kind="'+k+'" class="'+(F.kind===k?"on":"")+'">'+esc(t(key))+'</button>';}
  var html='<h2>'+esc(editId?t("a_edit"):t("a_new"))+'</h2>'
    +'<label>'+esc(t("a_section"))+'</label>'
    +'<div class="seg" id="kindSeg">'+kindBtn("obuna","tab_obuna")+kindBtn("promokod","tab_promokod")+kindBtn("telegram","tab_telegram")+kindBtn("product","tab_products")+'</div>'
    +'<label>'+esc(t("a_title"))+'</label><input id="f_title" value="'+esc(F.title)+'">'
    +'<div class="arow"><div><label>'+esc(t("a_category"))+'</label><input id="f_cat" value="'+esc(F.cat)+'"></div>'
    +'<div><label>'+esc(t("a_price"))+'</label><input id="f_price" type="number" inputmode="numeric" value="'+esc(F.price)+'"></div>'
    +'<div><label>'+esc(t("a_stock"))+'</label><input id="f_stock" type="number" inputmode="numeric" value="'+esc(F.stock)+'"></div></div>'
    +'<div class="arow"><div><label>'+esc(t("a_label"))+'</label><input id="f_label" value="'+esc(F.label)+'"></div>'
    +'<div><label>'+esc(t("a_sublabel"))+'</label><input id="f_sub" value="'+esc(F.sub)+'"></div></div>'
    +'<div class="colors">'
    +'<div><label>'+esc(t("a_bg"))+'</label><input id="f_bg" type="color" value="'+esc(F.bg)+'" style="height:42px;padding:4px"></div>'
    +'<div><label>'+esc(t("a_fg"))+'</label><input id="f_fg" type="color" value="'+esc(F.fg)+'" style="height:42px;padding:4px"></div></div>'
    +'<label>'+esc(t("a_img"))+'</label><input id="f_file" type="file" accept="image/jpeg,image/png,image/webp">'
    +'<div class="switch"><span style="font-size:13.5px">'+esc(t("a_active"))+'</span><button class="swbtn'+(F.active?" on":"")+'" id="f_active"><i></i></button></div>'
    +'<label>'+esc(t("a_desc_uz"))+'</label><textarea id="f_duz" rows="2">'+esc(F.duz)+'</textarea>'
    +'<label>'+esc(t("a_desc_ru"))+'</label><textarea id="f_dru" rows="2">'+esc(F.dru)+'</textarea>'
    +'<label>'+esc(t("a_desc_en"))+'</label><textarea id="f_den" rows="2">'+esc(F.den)+'</textarea>'
    +'<label>'+esc(t("a_preview"))+'</label><div id="prevBox" style="max-width:210px"></div>'
    +'<div style="height:10px"></div>'
    +'<button class="btn big" id="fSave">'+esc(editId?t("a_save"):t("a_add"))+'</button>';
  var sh=openSheet(html);
  function g(sel){return sh.querySelector(sel);}
  function readForm(){
    F.title=g("#f_title").value.trim();F.cat=g("#f_cat").value.trim();
    F.price=g("#f_price").value;F.stock=g("#f_stock").value;
    F.label=g("#f_label").value;F.sub=g("#f_sub").value;
    F.bg=g("#f_bg").value;F.fg=g("#f_fg").value;
    F.den=g("#f_den").value;F.duz=g("#f_duz").value;F.dru=g("#f_dru").value;
  }
  function preview(){
    readForm();
    var fake={tile:{label:F.label||F.title||"NEW",sub:F.sub,bg:F.bg,fg:F.fg,img:F.img},
      title:F.title||"…",cat:F.cat,price:Number(F.price)||0,stock:Number(F.stock)||0};
    var out=fake.stock<=0;
    g("#prevBox").innerHTML='<div class="pcard">'+tileHTML(fake)
      +'<div class="pbody"><div class="nm">'+esc(fake.title)+'</div><div class="ct">'+esc(fake.cat)+'</div>'
      +'<div class="prow"><span class="prc">'+esc(money(fake.price))+'</span><span class="stkb'+(out?" out":"")+'">'
      +(out?esc(t("out_stock")):fake.stock+" "+esc(t("in_stock")))+'</span></div></div></div>';
  }
  var ks=sh.querySelectorAll("#kindSeg [data-kind]");
  for(var i=0;i<ks.length;i++)ks[i].addEventListener("click",function(){
    F.kind=this.getAttribute("data-kind");
    var all=sh.querySelectorAll("#kindSeg [data-kind]");
    for(var j=0;j<all.length;j++)all[j].classList.toggle("on",all[j]===this);
  });
  g("#f_active").addEventListener("click",function(){F.active=!F.active;this.classList.toggle("on",F.active);});
  var file=g("#f_file");
  if(file)file.addEventListener("change",function(){
    try{
      var f=this.files&&this.files[0];if(!f)return;
      var rd=new FileReader();
      rd.onload=function(){
        var im=new Image();
        im.onload=function(){
          try{
            var MAX=600,w=im.width,h=im.height;
            if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
            if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
            var cv=document.createElement("canvas");cv.width=w;cv.height=h;
            cv.getContext("2d").drawImage(im,0,0,w,h);
            F.img=cv.toDataURL("image/jpeg",0.8);
            preview();toast("📷 OK");
          }catch(e){toast("Rasm xatosi");}
        };
        im.src=rd.result;
      };
      rd.readAsDataURL(f);
    }catch(e){toast("Rasm xatosi");}
  });
  var inputs=sh.querySelectorAll("input,textarea");
  for(var n=0;n<inputs.length;n++)inputs[n].addEventListener("input",preview);
  g("#fSave").addEventListener("click",function(){
    readForm();
    if(!F.title||!Number(F.price)){toast(t("a_need"));return;}
    var data={
      kind:F.kind,cat:F.cat,price:Number(F.price),stock:Number(F.stock)||0,active:F.active,
      tile:{label:F.label||F.title,sub:F.sub,bg:F.bg,fg:F.fg,img:F.img},
      title:F.title,
      desc:{en:F.den||F.duz,uz:F.duz||F.den,ru:F.dru||F.duz||F.den}
    };
    if(F.id){patchItem(F.id,data);toast(t("a_saved"));}
    else{data.id="c"+Date.now();S.custom.push(data);toast(t("a_added"));}
    persist();haptic("ok");closeSheet();
    S.screen="home";S.tab=F.kind;render();
  });
  preview();
}

/* ===== events ===== */
function bind(){
  var i,els;
  els=document.querySelectorAll("[data-nav]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){go(this.getAttribute("data-nav"));});
  els=document.querySelectorAll("[data-gotopay]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){go("pay");});
  els=document.querySelectorAll("[data-tab]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){S.tab=this.getAttribute("data-tab");render();});
  els=document.querySelectorAll("[data-open]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){openProduct(this.getAttribute("data-open"));});
  els=document.querySelectorAll("[data-support]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){openLink("https://t.me/"+SUPPORT_USERNAME);});
  els=document.querySelectorAll("[data-copy]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){copyText(this.getAttribute("data-copy"));});
  els=document.querySelectorAll("[data-setlang]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){S.lang=this.getAttribute("data-setlang");persist();render();});
  els=document.querySelectorAll("[data-chip]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    S.topup.amount=Number(this.getAttribute("data-chip"));render();
  });
  els=document.querySelectorAll("[data-method]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    var amtEl=document.getElementById("payAmount");
    if(amtEl)S.topup.amount=Math.round(Number(amtEl.value))||S.topup.amount;
    S.topup.method=this.getAttribute("data-method");haptic();render();
  });
  var tg1=document.getElementById("topupGo");
  if(tg1)tg1.addEventListener("click",createTopup);
  var pw=document.getElementById("pwPaid");
  if(pw)pw.addEventListener("click",markPaid);
  var pa=document.getElementById("pwAbort");
  if(pa)pa.addEventListener("click",function(){S.activePay=null;persist();toast(t("cancelled_toast"));render();});
  var ab=document.getElementById("adminBtn");
  if(ab)ab.addEventListener("click",openAdmin);
  tickTimer();
}

/* ===== boot ===== */
function boot(){
  render();
  loadServerCatalog();
  loadMe();
  setInterval(tickTimer,1000);
  setInterval(function(){
    if(tgUser()&&(S.screen==="orders"||S.screen==="home"))loadMe();
  },20000);
  setTimeout(function(){
    var sp=document.getElementById("splash");
    if(sp){sp.classList.add("off");setTimeout(function(){sp.remove();},500);}
  },700);
}
document.addEventListener("DOMContentLoaded",boot);
if(document.readyState!=="loading")boot();
// Kodning eng oxiriga shu 2 qatorni qo'sh
console.log("Dastur yuklandi");
window.render = render;
</script>
