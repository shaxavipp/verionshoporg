<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shop</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#0a0e14; --card:#121821; --card2:#1a2230; --line:#28323f;
  --txt:#eef3f8; --mut:#87939f; --mut2:#c3ccd6; --acc:#2f8fff; --acc2:#8fc2ff; --grad:linear-gradient(135deg,#0f6fe0 0%,#3ea0ff 55%,#c7dcf5 100%);
  --hdrbg:rgba(18,20,26,.62);
  --glassline:rgba(255,255,255,.14);
  --ok:#30d158; --warn:#ffd60a; --blue:#4da3ff; --err:#ff453a; --gold:#c7d4e0;
  --r:18px;
  --spring:cubic-bezier(.25,.1,.25,1);
  --ease:cubic-bezier(.22,1,.36,1);
  --glass:blur(28px) saturate(200%);
}
[data-theme="light"]{
  --bg:#f3f6fa; --card:#ffffff; --card2:#eaf1fa; --line:#dbe6f0;
  --txt:#101820; --mut:#5c6b78; --mut2:#3a4652; --acc:#1f7ae0; --acc2:#0c56b8; --grad:linear-gradient(135deg,#0f6fe0 0%,#3ea0ff 55%,#c7dcf5 100%);
  --hdrbg:rgba(255,255,255,.62);
  --glassline:rgba(255,255,255,.6);
  --ok:#1fa84c; --warn:#b8860b; --blue:#1f7ae0; --err:#e0342a; --gold:#7c8b99;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.45;overflow-x:hidden;
  padding-bottom:calc(200px + env(safe-area-inset-bottom));
  transition:background .25s ease,color .25s ease;
  position:relative;
}
body::before{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(760px 540px at 12% -8%, rgba(47,143,255,.24), transparent 60%),
    radial-gradient(640px 540px at 108% 10%, rgba(143,194,255,.16), transparent 58%),
    radial-gradient(820px 640px at 50% 118%, rgba(47,143,255,.18), transparent 62%);
  transition:opacity .25s ease;
}
[data-theme="light"] body::before{
  background:
    radial-gradient(760px 540px at 12% -8%, rgba(31,122,224,.12), transparent 60%),
    radial-gradient(640px 540px at 108% 10%, rgba(31,122,224,.09), transparent 58%),
    radial-gradient(820px 640px at 50% 118%, rgba(31,122,224,.08), transparent 62%);
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;transition:transform .12s ease,opacity .12s ease}
button:active{transform:scale(.96)}
input,textarea{

  font:inherit;color:var(--txt);background:var(--card2);
  border:1px solid var(--line);border-radius:12px;padding:11px 13px;width:100%;outline:none;
  transition:border-color .15s;
}
input:focus,textarea:focus{border-color:var(--acc)}
label{display:block;font-size:12.5px;color:var(--mut);margin:12px 0 5px}
.hide{display:none!important}
img{max-width:100%}

/* error overlay */
#errbox{position:fixed;inset:auto 12px 94px 12px;z-index:9999;background:#3a1210;border:1px solid var(--err);
  border-radius:12px;padding:12px;font-size:12px;color:#ffb4ae;white-space:pre-wrap;word-break:break-word;
  display:none;max-height:40vh;overflow:auto;}

/* splash */
#splash{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;transition:opacity .45s ease;}
#splash.off{opacity:0;pointer-events:none}
#splash .slogo{width:86px;height:86px;border-radius:24px;background:var(--grad);display:flex;align-items:center;
  justify-content:center;font-size:42px;font-weight:800;color:#fff;
  box-shadow:0 12px 40px rgba(124,92,255,.45);animation:pulse 1.2s ease-in-out infinite;}
#splash .sname{font-size:20px;font-weight:800;letter-spacing:.02em}
#splash .sbar{width:120px;height:4px;border-radius:2px;background:var(--card2);overflow:hidden}
#splash .sbar i{display:block;height:100%;width:40%;border-radius:2px;background:var(--grad);animation:slide 1s linear infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes slide{0%{margin-left:-40%}100%{margin-left:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.screen{animation:fadeUp .22s ease}

/* header */
header{position:sticky;top:0;z-index:50;background:var(--hdrbg);
  backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);
  padding:9px 16px;border-bottom:1px solid var(--glassline);
  box-shadow:0 1px 0 rgba(255,255,255,.06) inset;
  display:flex;align-items:center;justify-content:space-between;gap:8px;}
header .hu{display:flex;align-items:center;gap:9px;min-width:0}
header .hav{width:34px;height:34px;border-radius:50%;overflow:hidden;flex:0 0 auto;
  background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff}
header .hav img{width:100%;height:100%;object-fit:cover}
header .htx{min-width:0}
header .hn{font-size:14px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52vw}
header .hun{font-size:11.5px;color:var(--mut);line-height:1.2}
.hctrl{display:flex;align-items:center;gap:6px;flex:0 0 auto}
.hbtn{background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:6px 10px;
  font-size:11.5px;font-weight:800;color:var(--txt);white-space:nowrap;transition:transform .18s var(--spring)}
.hbtn:active{transform:scale(.9)}
.hbtn-ic{padding:6px 9px;font-size:14px}
.rowicon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:17px;flex:0 0 auto;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.ric-red{background:linear-gradient(135deg,#ff5b4d,#e0342a)}
.ric-green{background:linear-gradient(135deg,#34d17a,#1fa84c)}
.ric-blue{background:var(--grad)}

/* tabs */
.tabs{display:flex;gap:8px;padding:12px 16px 4px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.searchbar{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:0 12px;margin:10px 16px;height:46px}
.searchbar .sic{color:var(--mut);display:flex;flex-shrink:0}
.searchbar input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:14px;height:100%;font-family:inherit}
.searchbar input::placeholder{color:var(--mut)}
#prodPills{margin:0 16px 4px}
.tab{flex:0 0 auto;padding:9px 16px;border-radius:999px;background:var(--card);
  border:1px solid var(--line);font-size:13.5px;color:var(--mut);font-weight:700;transition:transform .22s var(--spring),background .2s ease}
.tab.on{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(124,92,255,.35);transform:scale(1.04)}
.tab:active{transform:scale(.94)}

/* product grid */
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 12px}
.groupgrid{grid-template-columns:1fr 1fr;gap:12px}
.groupgrid .ptile{height:172px}
.groupgrid.grid .pbody{padding:12px 12px 14px}
.groupgrid.grid .pbody .nm{font-size:16px;-webkit-line-clamp:2}
.groupgrid.grid .pbody .ct{font-size:13px}
.groupgrid .ptile .tl{font-size:30px!important}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;
  text-align:left;display:flex;flex-direction:column;box-shadow:0 4px 14px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.05);
  position:relative;transition:transform .28s var(--spring),box-shadow .28s ease;}
.pcard:active{transform:scale(.955);box-shadow:0 2px 8px rgba(0,0,0,.22)}
.favbtn{position:absolute;top:6px;right:6px;z-index:5;width:26px;height:26px;border-radius:50%;
  background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;color:#fff;
  backdrop-filter:blur(6px) saturate(150%)}
.favbtn:active{opacity:.6}
.favbtn.on{color:#ff4d6d}
.ptile{height:118px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;padding:6px;position:relative;overflow:hidden;}
.ptile img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ptile .tl{font-size:13px;font-weight:800;position:relative;z-index:1;text-align:center;text-shadow:0 1px 6px rgba(0,0,0,.35)}
.ptile .ts{font-size:9px;opacity:.9;position:relative;z-index:1;text-align:center}
.pbody{padding:5px 7px 6px;display:flex;flex-direction:column;gap:2px;flex:1}
.pbody .nm{font-size:10.5px;font-weight:650;min-height:1.3em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.pbody .ct{font-size:8.5px;color:var(--mut)}
.prow{display:flex;align-items:center;justify-content:space-between;margin-top:auto;gap:4px;flex-wrap:wrap}
.prc{font-size:11.5px;font-weight:800;color:var(--acc2)}
.stkb{font-size:8.5px;font-weight:700;padding:2px 6px;border-radius:999px;background:rgba(48,209,88,.14);color:var(--ok);white-space:nowrap}
.stkb.out{background:rgba(255,69,58,.14);color:var(--err)}
.empty{padding:40px 20px;text-align:center;color:var(--mut);font-size:13.5px;grid-column:1/-1}

/* sheet */
.dim{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);z-index:100;opacity:0;transition:opacity .28s var(--ease)}
.dim.on{opacity:1}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:101;
  background:var(--hdrbg);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);
  border-radius:24px 24px 0 0;border-top:1px solid var(--glassline);padding:0;display:flex;flex-direction:column;
  max-height:calc(var(--vh, 1vh) * 90);top:auto;overflow:hidden;
  box-shadow:0 -10px 50px rgba(0,0,0,.4),0 1px 0 rgba(255,255,255,.1) inset;
  transform:translateY(105%);transition:transform .42s var(--spring);}
.sheet.on{transform:translateY(0)}
.sheet-head{position:relative;flex:0 0 auto;padding:10px 16px 0}
.sheet-body{flex:1 1 auto;min-height:0;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
  padding:0 16px calc(90px + env(safe-area-inset-bottom));}
.grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 12px}
.bal-retry{color:var(--acc2);text-decoration:underline;font-size:.85em;cursor:pointer}
.sheet-x{position:absolute;top:0;right:12px;width:30px;height:30px;border-radius:50%;
  background:var(--card2);border:none;display:flex;align-items:center;justify-content:center;color:var(--txt);flex-shrink:0;
  transition:transform .2s var(--spring)}
.sheet-x:active{transform:scale(.82)}
.sheet-x svg{width:15px;height:15px}
.sheet h2{font-size:18px;font-weight:800;margin-bottom:2px}
.sheet .cat{font-size:12px;color:var(--mut);margin-bottom:10px}
.sheet .desc{font-size:14px;color:var(--txt);opacity:.88;margin:10px 0 14px;white-space:pre-wrap}
.bigtile{height:118px;border-radius:16px;margin-bottom:12px}

/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;
  padding:12px;border-radius:14px;font-weight:800;font-size:14px;background:var(--grad);color:#fff;
  box-shadow:0 5px 16px rgba(124,92,255,.32),inset 0 1px 0 rgba(255,255,255,.25);
  position:relative;overflow:hidden;transition:transform .22s var(--spring),box-shadow .22s ease;}
.btn:active{transform:scale(.95);box-shadow:0 2px 8px rgba(124,92,255,.25)}
.btn.big{padding:14px;font-size:15px;border-radius:16px}
.btn.gray{background:var(--card2);border:1px solid var(--line);color:var(--txt);box-shadow:none}
.btn.red{background:transparent;border:1px solid var(--err);color:var(--err);box-shadow:none}
.btn.green{background:linear-gradient(135deg,#1fa74a,#30d158)}
.btn:disabled{opacity:.4;box-shadow:none;transform:none}
.btn.sm{width:auto;padding:7px 12px;font-size:12px;border-radius:10px}

/* cards & rows */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin:0 16px 12px;
  padding:11px 14px;box-shadow:0 5px 16px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.04);
  transition:transform .2s var(--ease)}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer}
.ibadge{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.row:last-child{border-bottom:none}
.row .l{font-size:13.5px;font-weight:600}
.row .l .d{font-size:11px;color:var(--mut);margin-top:2px;font-weight:400}
.row .r{font-size:12.5px;color:var(--mut);text-align:right}
.sect{font-size:11px;font-weight:800;letter-spacing:.07em;color:var(--mut);margin:13px 16px 6px;text-transform:uppercase}
.backrow{display:flex;align-items:center;gap:8px;margin:6px 16px 14px;background:none;border:none;
  color:var(--txt);font-size:16px;font-weight:800;padding:6px 0;transition:transform .2s var(--spring)}
.backrow:active{transform:translateX(-4px)}
.backrow svg{flex:0 0 auto}

.ordcard{padding:10px 13px}
.ordrow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ordrow .l{font-size:13px;font-weight:600}
.ordrow .l .d{font-size:10.5px;color:var(--mut);margin-top:2px;font-weight:400}
.ordrow .badge{flex:0 0 auto;margin-top:1px}
.ordacts{display:flex;align-items:center;gap:8px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
.ordacts .btn.sm{flex:1}
.ordreviewed{font-size:11px;color:var(--ok);font-weight:700;display:flex;align-items:center;gap:4px}
.badge{font-size:10px;padding:3px 9px;border-radius:999px;font-weight:800;white-space:nowrap}
.badge.ok{background:rgba(48,209,88,.14);color:var(--ok)}
.badge.pend{background:rgba(255,214,10,.14);color:var(--warn)}
.badge.chk{background:rgba(77,163,255,.14);color:var(--blue)}
.badge.cncl{background:rgba(255,69,58,.14);color:var(--err)}
.code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:var(--card2);
  border:1px dashed var(--acc);border-radius:8px;padding:2px 8px;font-size:12px;color:var(--acc2);}
.toast{position:fixed;left:50%;bottom:calc(88px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px) scale(.9);
  background:rgba(30,32,40,.82);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);
  border:1px solid var(--line);color:var(--txt);padding:11px 18px;border-radius:14px;
  font-size:13.5px;z-index:600;opacity:0;transition:all .38s var(--spring);max-width:86vw;text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.45);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
.toast.err{background:rgba(58,28,28,.85);border-color:#5c2b2b;color:#ffb4b4;font-weight:700}

/* bottom nav */
nav{position:fixed;left:12px;right:12px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:60;display:flex;
  background:var(--hdrbg);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);
  border:1px solid var(--glassline);border-radius:26px;box-shadow:0 10px 30px rgba(0,0,0,.35),0 -1px 0 rgba(255,255,255,.05) inset;padding:7px 0;}
nav button{flex:1;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;
  color:var(--mut);font-size:10.5px;font-weight:700;transition:transform .22s var(--spring),color .2s ease}
nav button:active{transform:scale(.88)}
nav button.on{color:#eaf3ff}
nav button svg{width:24px;height:24px;transition:filter .25s ease}
nav button.on svg{filter:drop-shadow(0 0 5px rgba(143,197,255,.75));animation:navGlow 2.2s ease-in-out infinite,navSelectPop .32s cubic-bezier(.34,1.56,.64,1) both;animation-delay:0s,0s!important}
@keyframes navSelectPop{
  0%{transform:scale(.78) translateY(6px)}
  50%{transform:scale(1.22) translateY(-6px)}
  75%{transform:scale(.95) translateY(1px)}
  100%{transform:scale(1) translateY(0)}
}
/* sirg'anuvchi "glass" belgi — qaysi bo'lim tanlangan bo'lsa, o'sha tugma (ikonka+yorliq) ustiga sirpanib o'tadi */
.navpill{position:absolute;left:0;top:0;width:64px;height:64px;border-radius:20px;z-index:0;
  background:linear-gradient(155deg,rgba(79,140,255,.38),rgba(43,99,224,.34));
  border:1.5px solid rgba(150,200,255,.65);
  backdrop-filter:blur(18px) saturate(180%);-webkit-backdrop-filter:blur(18px) saturate(180%);
  box-shadow:0 6px 22px rgba(60,130,255,.4),0 0 16px rgba(90,160,255,.28),inset 0 1px 0 rgba(255,255,255,.4);
  opacity:0;pointer-events:none;
  transition:left .24s cubic-bezier(.22,1,.36,1),top .24s cubic-bezier(.22,1,.36,1),
    width .24s cubic-bezier(.22,1,.36,1),height .24s cubic-bezier(.22,1,.36,1),
    opacity .2s ease}
.navpill.show{opacity:1}
[data-reduce-motion="1"] .navpill{transition:opacity .2s ease}
nav.navintro{animation:navSlideIn .55s cubic-bezier(.22,1,.36,1) both}
nav.navintro button{opacity:0;animation:navPopIn .5s cubic-bezier(.22,1,.36,1) both}
nav.navintro button:nth-child(1){animation-delay:.16s}
nav.navintro button:nth-child(2){animation-delay:.23s}
nav.navintro button:nth-child(3){animation-delay:.30s}
nav.navintro button:nth-child(4){animation-delay:.37s}
nav.navintro button:nth-child(5){animation-delay:.44s}
@keyframes navSlideIn{
  from{transform:translateY(100%);opacity:0}
  to{transform:translateY(0);opacity:1}
}
@keyframes navPopIn{
  0%{opacity:0;transform:translateY(14px) scale(.6)}
  60%{opacity:1;transform:translateY(-3px) scale(1.08)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes navGlow{
  0%,100%{filter:drop-shadow(0 0 5px rgba(124,92,255,.7))}
  50%{filter:drop-shadow(0 0 9px rgba(124,92,255,1))}
}
.shine-ic{display:inline-flex;color:#ffb020;filter:drop-shadow(0 0 4px rgba(255,176,32,.55));animation:shineGlow 2.6s ease-in-out infinite}
@keyframes shineGlow{
  0%,100%{filter:drop-shadow(0 0 3px rgba(255,176,32,.45));transform:scale(1)}
  50%{filter:drop-shadow(0 0 8px rgba(255,176,32,.9));transform:scale(1.08)}
}
nav button:not(.on) svg{animation:navIdle 3.6s ease-in-out infinite}
nav button:nth-child(1) svg{animation-delay:0s}
nav button:nth-child(2) svg{animation-delay:.25s}
nav button:nth-child(3) svg{animation-delay:.5s}
nav button:nth-child(4) svg{animation-delay:.75s}
nav button:nth-child(5) svg{animation-delay:1s}
@keyframes navIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.ptile .isvg{animation:navIdle 3.2s ease-in-out infinite}
[data-reduce-motion="1"] nav button svg{animation:none!important;transform:none!important}
[data-reduce-motion="1"] .ptile .isvg{animation:none!important;transform:none!important}
[data-reduce-motion="1"] nav.navintro,[data-reduce-motion="1"] nav.navintro button{animation:none;opacity:1}
[data-reduce-motion="1"] .shine-ic{animation:none;transform:none}

/* onboarding */
#onb{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;text-align:center}
#onb .biglogo{width:80px;height:80px;border-radius:24px;background:var(--grad);display:flex;align-items:center;
  justify-content:center;font-size:38px;font-weight:800;color:#fff;margin-bottom:18px;
  box-shadow:0 12px 40px rgba(124,92,255,.45)}
#onb h1{font-size:25px;margin-bottom:6px}
#onb p{color:var(--mut);font-size:14px;margin-bottom:26px}
#onb .langs{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
#onb .langs button{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:15px;padding:15px 18px;font-size:15px;font-weight:700;}
#onb .langs .fl{font-size:22px}

/* pay screen */
.paybox{margin:0 16px 9px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:13px;box-shadow:0 5px 16px rgba(0,0,0,.18);}
.amount{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--line);
  border-radius:12px;padding:3px 12px 3px 4px;}
.amount input{border:none;background:transparent;font-size:16px;font-weight:600;padding:9px;color:var(--txt)}
.amount input::placeholder{color:var(--mut);font-weight:600;opacity:1}
.amount .cur{color:var(--mut);font-size:13px;font-weight:700}
.minnote{font-size:11px;color:var(--mut);margin-top:6px}
.chips{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}

/* ===== server api ===== */
function api(path,method,body){
  if(typeof fetch!=="function")return Promise.reject(new Error("nofetch"));
  var initData=(TG&&TG.initData)?TG.initData:"";
  return fetch(path,{method:method||"GET",
    headers:{"Content-Type":"application/json","X-Init-Data":initData},
    body:body?JSON.stringify(body):undefined})
  .then(function(r){return r.json().then(function(j){j.__code=r.status;if(!r.ok){var e=new Error("http");e.resp=j;throw e;}return j;});});
}
var ME_ERROR=false;
/* Admin bitta (o'zbekcha) tavsif yozadi — saqlaganda shu funksiya orqali
   ruscha/inglizchaga avtomatik tarjima qilinadi. Qator-qator tarjima qilinadi,
   shunda ✅/⚠️/📌 kabi belgilar va matn tuzilishi (satrlar) buzilmaydi.
   Agar tarjima xizmati javob bermasa — asl (o'zbekcha) matn o'zi qo'yiladi,
   saqlashning o'zi hech qachon to'xtab qolmaydi. */
function translateLine(line,target){
  var trimmed=line.trim();
  if(!trimmed)return Promise.resolve(line);
  if(typeof fetch!=="function")return Promise.resolve(line);
  var url="https://api.mymemory.translated.net/get?q="+encodeURIComponent(trimmed)+"&langpair=uz|"+target;
  return fetch(url).then(function(r){return r.json();}).then(function(j){
    var out=j&&j.responseData&&j.responseData.translatedText;
    return out?String(out):line;
  }).catch(function(){return line;});
}
function translateText(text,target){
  if(!text||!text.trim())return Promise.resolve(text||"");
  var lines=text.split("\n");
  return Promise.all(lines.map(function(l){return translateLine(l,target);})).then(function(arr){return arr.join("\n");});
}
var _meSig="";
function loadMe(cb){
  if(!tgUser()||typeof fetch!=="function"){if(cb)cb();return;}
  api("/api/me").then(function(r){
    var sig=JSON.stringify(r);
    var changed=sig!==_meSig;
    _meSig=sig;
    ME={balance:r.balance,payments:r.payments||[],orders:r.orders||[],favorites:r.favorites||[]};
    ME_ERROR=false;
    if(cb)cb();else if(S.lang&&changed)render(); // balans/buyurtma o'zgarmagan bo'lsa qayta chizmaymiz
  }).catch(function(){
    ME_ERROR=true;
    if(cb)cb();else if(S.lang)render();
  });
}
var REFERRAL=null;
function loadReferral(cb){
  if(!tgUser()||typeof fetch!=="function")return;
  api("/api/referral").then(function(r){
    REFERRAL=r;
    if(cb)cb();
    else if(S.lang&&S.screen==="profile")render();
  }).catch(function(){});
}
function toggleFavorite(itemId){
  var i=ME.favorites.indexOf(itemId);
  if(i===-1)ME.favorites.push(itemId);else ME.favorites.splice(i,1);
  render();
  api("/api/favorite","POST",{itemId:itemId}).then(function(r){
    if(r&&r.favorites)ME.favorites=r.favorites;
  }).catch(function(){});
}
function balHTML(){
  if(ME.balance!==null)return esc(money(ME.balance));
  if(ME_ERROR)return '<span class="bal-retry" data-retrybal="1">'+esc(t("retry_load"))+'</span>';
  return "…";
}

/* ===== catalog ===== */
function baseCatalog(){
  if(S.serverCat&&S.serverCat.length)return S.serverCat;
  return DEFAULT_CATALOG;
}
function catalog(){
  if(S.imported&&S.imported.length)return S.imported;
  var BASE=baseCatalog();
  var out=[];
  for(var i=0;i<BASE.length;i++){
    var it=BASE[i];
    if(S.removed.indexOf(it.id)!==-1)continue;
    var copy=JSON.parse(JSON.stringify(it));
    var p=S.over[it.id];
    if(p)for(var k in p){if(k==="tile"){for(var tk in p.tile)copy.tile[tk]=p.tile[tk];}else copy[k]=p[k];}
    out.push(copy);
  }
  for(var j=0;j<S.custom.length;j++)out.push(S.custom[j]);
  return out;
}
function byId(id){var c=catalog();for(var i=0;i<c.length;i++)if(c[i].id===id)return c[i];return null;}
function catEnabled(kind){var m=CatMeta[kind];return !(m&&m.enabled===false);}
function activeItems(kind){if(!catEnabled(kind))return [];return catalog().filter(function(x){return x.kind===kind&&x.active!==false;});}

/* ===== helpers ===== */
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function money(n){n=Number(n)||0;return n.toLocaleString("ru-RU").replace(/,/g," ")+" so'm";}
function loc(v){if(v==null)return"";if(typeof v==="string")return v;return v[S.lang]||v.uz||v.en||v.ru||"";}
function orderId(){var a="ABCDEFGHJKMNPQRSTUVWXYZ23456789",s="";for(var i=0;i<6;i++)s+=a.charAt(Math.floor(Math.random()*a.length));return "VN-"+s;}
function toast(msg,isErr){var el=document.getElementById("toast");el.textContent=msg;el.classList.toggle("err",!!isErr);el.classList.add("on");clearTimeout(toast._t);toast._t=setTimeout(function(){el.classList.remove("on");},isErr?4200:2200);}
function tgName(){var u=tgUser();return u?(u.first_name||"")+(u.last_name?" "+u.last_name:""):null;}
function referralShareText(){

function copyText(txt){
  var done=function(){toast(t("copied"));haptic("ok");};
  try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done,function(){});return;}}catch(e){}
  try{var ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();done();}catch(e){}
}
function fmtDate(ts){var d=new Date(ts);return d.toLocaleDateString()+" "+("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);}
function initials(){var n=tgName();if(!n)return "👤";var p=n.trim().split(/\s+/);return (p[0][0]||"")+(p[1]?p[1][0]:"");}

function applyTGChrome(){
  try{
    if(!TG)return;
    var bg=S.theme==="light"?"#f3f6fa":"#0c0c11";
    if(TG.setHeaderColor)TG.setHeaderColor(bg);
    if(TG.setBackgroundColor)TG.setBackgroundColor(bg);
    if(TG.setBottomBarColor)TG.setBottomBarColor(bg);
  }catch(e){}
}
function bindNavOnce(){
  var els=document.querySelectorAll("[data-nav]");
  for(var i=0;i<els.length;i++)els[i].addEventListener("click",function(){go(this.getAttribute("data-nav"));});
}
function render(){
  var app=document.getElementById("app");
  document.documentElement.setAttribute("data-theme",S.theme==="light"?"light":"dark");
  document.documentElement.setAttribute("data-reduce-motion",S.reduceMotion?"1":"0");
  applyTGChrome();
  if(!S.lang){app.innerHTML=onboardingHTML();bindOnboarding();return;}
  var screenWrap=document.getElementById("screenWrap");
  var navEl=document.getElementById("mainNav");
  if(!screenWrap||!navEl||_navLangBuilt!==S.lang){
    // Nav (blur-effekt + doimiy SVG animatsiya bilan) faqat shu yerda —
    // til o'zgarganda yoki birinchi marta — noldan yaratiladi. Aks holda
    // u umuman qayta yaratilmaydi, shu bilan har bir tab bosilishidagi
    // "qotib qolish" hissi yo'qoladi.
    app.innerHTML='<div id="screenWrap"></div>'+navHTML();
    screenWrap=document.getElementById("screenWrap");
    _navLangBuilt=S.lang;
    NAV_PILL_LAST=null;
    bindNavOnce(); // faqat shu yerda — aks holda bosilganda listener ko'payib, bir bosishda bir necha marta ishga tushib qolardi
  }
  var html=(S.screen==="profile"?"":headerHTML())+'<div class="screen">';
  if(S.screen==="home")html+=homeHTML();
  else if(S.screen==="products")html+=productsScreenHTML();
  else if(S.screen==="orders")html+=ordersHTML();
  else if(S.screen==="pay")html+=payHTML();
  else html+=profileHTML();
  html+='<div style="height:80px"></div></div>';
  screenWrap.innerHTML=html;
  updateNavActive();
  bind();
  requestAnimationFrame(positionNavPill);
}
var _navLangBuilt=null;

function navHTML(){
  function b(id,icon,label){return '<button data-nav="'+id+'" class="'+(S.screen===id?"on":"")+'">'+IC[icon]+'<span>'+esc(label)+'</span></button>';}

}
// Nav DOM'ini yo'q qilib qaytadan yaratmasdan — faqat aktiv tugmani almashtiradi.
// (backdrop-filter blur + SVG glow-animatsiya bor nav har safar noldan
// yaratilganda GPU ularni qaytadan hisoblashga majbur bo'lardi — aynan shu
// har bir tab bosilganda "qotib qolish" hissini berardi.)
function updateNavActive(){
  var nav=document.getElementById("mainNav");
  if(!nav)return;
  var btns=nav.querySelectorAll("[data-nav]");
  for(var i=0;i<btns.length;i++){
    var on=btns[i].getAttribute("data-nav")===S.screen;
    btns[i].classList.toggle("on",on);
  }
}
var NAV_PILL_LAST=null;
function positionNavPill(){
  try{
    var nav=document.querySelector("nav"); if(!nav)return;
    var pill=nav.querySelector("#navPill"); if(!pill)return;
    var activeBtn=nav.querySelector("button.on");
    if(!activeBtn){pill.classList.remove("show");NAV_PILL_LAST=null;return;}
    var navRect=nav.getBoundingClientRect();
    var btnRect=activeBtn.getBoundingClientRect();
    var padX=3,padY=-1;
    var target={
      left: Math.round(btnRect.left-navRect.left+padX),
      top: Math.round(btnRect.top-navRect.top+padY),
      w: Math.round(btnRect.width-padX*2),
      h: Math.round(btnRect.height-padY*2)
    };
    pill.classList.add("show");
    if(NAV_PILL_LAST){
      // avval eski joyga (animatsiyasiz) qo'yamiz, keyin yangi joyga sirpanib boradi (FLIP usuli)
      pill.style.transition="none";
      pill.style.left=NAV_PILL_LAST.left+"px";
      pill.style.top=NAV_PILL_LAST.top+"px";
      pill.style.width=NAV_PILL_LAST.w+"px";
      pill.style.height=NAV_PILL_LAST.h+"px";
      pill.classList.add("show");
      void pill.offsetWidth; // reflow
      pill.style.transition="";
      requestAnimationFrame(function(){
        pill.style.left=target.left+"px";
        pill.style.top=target.top+"px";
        pill.style.width=target.w+"px";
        pill.style.height=target.h+"px";
      });
    }else{
      pill.style.left=target.left+"px";
      pill.style.top=target.top+"px";
      pill.style.width=target.w+"px";
      pill.style.height=target.h+"px";
      pill.classList.add("show");
    }
    NAV_PILL_LAST=target;
  }catch(e){}
}
window.addEventListener("resize",function(){NAV_PILL_LAST=null;positionNavPill();});

/* Kategoriya → Guruh → Mahsulot: bir kategoriyadagi mahsulotlarni "group" kaliti
   bo'yicha guruhlarga ajratadi. Agar hech bir mahsulotda "group" bo'lmasa — null
   qaytaradi (bu holda eski tarzda to'g'ridan-to'g'ri mahsulotlar ro'yxati chiqadi,
   guruh qavati umuman ko'rsatilmaydi). Guruhsiz mahsulotlar (ba'zilari group bilan,
   ba'zilari yo'q bo'lsa) "Boshqa" degan standart guruhga tushadi. */
function groupsOf(kind){
  var items=activeItems(kind);
  var hasAny=false;
  for(var i=0;i<items.length;i++)if(items[i].group){hasAny=true;break;}
  if(!hasAny)return null;
  var map={},order=[];
  for(var j=0;j<items.length;j++){
    var it=items[j];
    var key=it.group||"__other";
    if(!map[key]){
      map[key]={key:key,label:it.group?(it.groupLabel||it.group):t("group_other"),img:it.groupImg||"",count:0};
      order.push(key);
    }
    map[key].count++;
  }
  return order.map(function(k){return map[k];});
}
function groupGridHTML(kind){
  var groups=groupsOf(kind);
  var html='<div class="grid groupgrid">';
  for(var i=0;i<groups.length;i++){
    var g=groups[i];
    var img=g.img?'<img src="'+esc(g.img)+'" alt="" loading="lazy">':('<div class="tl">'+esc((g.label||"?").slice(0,2).toUpperCase())+'</div>');
    html+='<button class="pcard" data-opengroup="'+esc(kind)+'::'+esc(g.key)+'">'
      +'<div class="ptile" style="background:#22304a;color:#fff">'+img+'</div>'
      +'<div class="pbody"><div class="nm">'+esc(g.label)+'</div>'
      +'<div class="ct">'+g.count+' '+esc(t("group_count_unit"))+'</div></div></button>';
  }
  return html+'</div>';
}

function openAdminCategories(){
  var html='<h2>'+esc(t("a_categories"))+'</h2><div class="paynote" style="margin-top:0">'+esc(t("a_categories_hint"))+'</div>';
  var enabledState={};
  for(var m=0;m<TABS.length;m++){
    var kind=TABS[m][0],labelKey=TABS[m][1];
    var meta=CatMeta[kind]||{};
    var lbl=meta.label||{};
    enabledState[kind]=meta.enabled!==false;
    html+='<div class="sect" style="margin:16px 0 6px">'+esc(t(labelKey))+'</div>'
      +'<div class="card">'
      +'<div class="switch"><span style="font-size:13.5px">'+esc(t("a_cat_enabled"))+'</span><button class="swbtn'+(enabledState[kind]?" on":"")+'" data-catsw="'+kind+'"><i></i></button></div>'
      +'<label>'+esc(t("a_cat_name_uz"))+'</label><input id="cn_'+kind+'_uz" value="'+esc(lbl.uz||"")+'" placeholder="'+esc(t(labelKey))+'">'
      +'<div class="minnote">'+ic("wand",12)+' '+esc(t("a_title_autotr"))+'</div>'
      +'<label>'+esc(t("a_img"))+'</label><input id="cf_'+kind+'" type="file" accept="image/jpeg,image/png,image/webp">'
      +(meta.img?'<div class="minnote">'+esc(t("a_cat_has_img"))+' <button class="btn sm red" data-clrimg="'+kind+'" type="button" style="margin-left:6px">'+ic("trash",12)+'</button></div>':'')
      +'</div>';
  }
  html+='<div style="height:8px"></div><button class="btn big" id="catSaveBtn">'+esc(t("a_save"))+'</button><div style="height:20px"></div>';
  var sh=openSheet(html);
  var pendingImg={};
  for(var i=0;i<TABS.length;i++)(function(kind){
    var f=sh.querySelector("#cf_"+kind);
    if(f)f.addEventListener("change",function(){
      var file=this.files&&this.files[0];if(!file)return;
      var rd=new FileReader();
      rd.onload=function(){pendingImg[kind]=rd.result;toast(t("a_img_selected"));};
      rd.readAsDataURL(file);
    });
    var clr=sh.querySelector('[data-clrimg="'+kind+'"]');
    if(clr)clr.addEventListener("click",function(){pendingImg[kind]="__clear__";toast(t("a_img_will_clear"));});
  })(TABS[i][0]);
  var swEls=sh.querySelectorAll("[data-catsw]");
  for(var si=0;si<swEls.length;si++)(function(btn){
    var kind=btn.getAttribute("data-catsw");
    btn.addEventListener("click",function(){
      var next=!enabledState[kind];
      var out=Object.assign({},CatMeta);
      var prev=out[kind]||{};
      out[kind]=Object.assign({},prev,{enabled:next});
      btn.disabled=true;
      api("/api/admin/category-meta","POST",out).then(function(){
        CatMeta=out;enabledState[kind]=next;btn.classList.toggle("on",next);btn.disabled=false;
        haptic("ok");toast(next?t("a_cat_unfrozen"):t("a_cat_frozen"));
      }).catch(function(){toast(t("srv_off"),true);btn.disabled=false;});
    });
  })(swEls[si]);
  var saveBtn=sh.querySelector("#catSaveBtn");
  saveBtn.addEventListener("click",function(){
    var out=Object.assign({},CatMeta);
    var kinds=TABS.map(function(x){return x[0];});
    var uzVals={};
    for(var j=0;j<kinds.length;j++)uzVals[kinds[j]]=sh.querySelector("#cn_"+kinds[j]+"_uz").value.trim();
    var origLabel=saveBtn.textContent;
    saveBtn.disabled=true;saveBtn.textContent=t("a_translating");
    Promise.all(kinds.map(function(kind){
      var uz=uzVals[kind];
      if(!uz)return Promise.resolve([kind,"",""]);
      return Promise.all([translateText(uz,"ru"),translateText(uz,"en")]).then(function(res){return [kind,res[0]||uz,res[1]||uz];});
    })).then(function(results){
      for(var k=0;k<results.length;k++){
        var kind=results[k][0],ru=results[k][1],en=results[k][2];
        var uz=uzVals[kind];
        var prev=out[kind]||{};
        var img=prev.img||"";
        if(pendingImg[kind]==="__clear__")img="";
        else if(pendingImg[kind])img=pendingImg[kind];
        out[kind]={label:{uz:uz,ru:ru,en:en},img:img,enabled:prev.enabled!==false};
      }
      api("/api/admin/category-meta","POST",out).then(function(){
        CatMeta=out;toast(t("a_saved"));haptic("ok");closeSheet();render();
      }).catch(function(){toast(t("srv_off"));saveBtn.disabled=false;saveBtn.textContent=origLabel;});
    });
  });
}

var REV_ROT_IDX=0;
// Avvalgi versiya kontentni 280ms KECHIKISH bilan (setTimeout ichida) almashtirardi —
// shu kechikish oynasida panel boshqa sabab bilan qayta chizilib qolsa (masalan
// loadReviews() yangilanishi bilan to'qnashsa), ikki sharh ustma-ust chiqib "qotib"
// qolishi mumkin edi ("kamaytirilgan animatsiya" yoqilganda bu kod yo'li umuman
// ishlamagani uchun muammo ko'rinmasdi). Endi kechikish umuman yo'q: kontent
// DARHOL (sinxron) almashtiriladi, faqat opacity animatsiyasi bitta requestAnimationFrame
// bilan silliqlashtiriladi — hech qanday "ochiq oyna" qolmaydi.
function rotateReviewWidget(){
  if(!REVIEWS||REVIEWS.length<2)return;
  var el=document.getElementById("revCurrent");
  if(!el)return;
  REV_ROT_IDX=(REV_ROT_IDX+1)%REVIEWS.length;
  el.innerHTML=reviewRotatorInnerHTML(REVIEWS[REV_ROT_IDX]);
  if(S.reduceMotion){el.style.opacity="1";return;}
  el.style.opacity="0";
  void el.offsetWidth; // reflow — brauzer opacity:0'ni "eski" holat sifatida qabul qilishi uchun
  requestAnimationFrame(function(){
    var el2=document.getElementById("revCurrent");
    if(el2)el2.style.opacity="1";
  });
}

function openReviewForm(orderId,itemTitle){
  var st=0,txt="";
  function bodyHTML(){
    var stars="";
    for(var i=1;i<=5;i++)stars+='<button type="button" data-star="'+i+'" class="starbtn'+(i<=st?" on":"")+'" style="background:none;border:none;padding:3px;cursor:pointer;color:'+(i<=st?"#ffb020":"var(--line)")+'">'+ic("star",30)+'</button>';
    return '<h2>'+ic("star",19)+' '+esc(t("review_title"))+'</h2>'
      +'<div class="cat" style="margin-bottom:12px">'+esc(itemTitle||"")+'</div>'
      +'<div id="starsRow" style="display:flex;gap:2px;margin-bottom:12px">'+stars+'</div>'
      +'<textarea id="revText" rows="3" maxlength="200" placeholder="'+esc(t("review_placeholder"))+'"></textarea>'
      +'<div style="height:10px"></div>'
      +'<button class="btn big" id="revSubmitBtn" disabled>'+esc(t("review_submit"))+'</button>';
  }
  var sh=openSheet(bodyHTML());
  function bindInner(){
    var btns=sh.querySelectorAll("[data-star]");
    for(var i=0;i<btns.length;i++)btns[i].addEventListener("click",function(){
      st=Number(this.getAttribute("data-star"));
      haptic("ok");
      sh.querySelector(".sheet-body").innerHTML=bodyHTML();
      bindInner();
      var ta=sh.querySelector("#revText");if(ta)ta.value=txt;
      var rows=sh.querySelectorAll("[data-star]");
      for(var k=0;k<rows.length;k++)if(Number(rows[k].getAttribute("data-star"))<=st)
        rows[k].animate([{transform:"scale(.5)"},{transform:"scale(1.25)"},{transform:"scale(1)"}],{duration:280,easing:"ease-out",delay:k*40});
    });
    var ta=sh.querySelector("#revText");
    if(ta){ta.value=txt;ta.addEventListener("input",function(){txt=this.value;});}
    var sb=sh.querySelector("#revSubmitBtn");
    sb.disabled=st<1;
    sb.addEventListener("click",function(){
      if(st<1)return;
      sb.disabled=true;var orig=sb.textContent;sb.textContent=t("processing");
      api("/api/review","POST",{orderId:orderId,stars:st,text:txt}).then(function(){
        haptic("ok");toast(t("review_thanks"));closeSheet();
        loadMe();loadReviews();
      }).catch(function(e){
        var code=e&&e.resp&&e.resp.error;
        toast(code==="already_reviewed"?t("review_err_already"):t("srv_off"),true);
        sb.disabled=false;sb.textContent=orig;
      });
    });
  }
  bindInner();
}

/* ===== sheets ===== */
function openSheet(inner){

  sh.innerHTML='<div class="sheet-head"><div class="grab"></div>'

    +'<div class="sheet-body">'+inner+'</div>';
  document.body.appendChild(dim);document.body.appendChild(sh);
  document.body.style.overflow="hidden";
  requestAnimationFrame(function(){dim.classList.add("on");sh.classList.add("on");});

}

/* ===== moslashuvchan (istalgan miqdorda) Stars xaridi — Fragment orqali ===== */
function openStarsBuy(it){
  var rate=Number(it.pricePerStar)||0, minS=Number(it.minStars)||50;
  var sh=openSheet(
    tileHTML(it,true)
    +'<h2>'+esc(loc(it.title))+'</h2><div class="cat">'+ic("star",13)+' '+esc(t("stars_unit"))+'</div>'
    +'<div class="sect" style="margin:14px 0 6px">@'+esc(t("username_label"))+'</div>'
    +'<div class="arow"><input id="stU" placeholder="@username"><button class="btn sm" id="stCheck">'+esc(t("check_btn"))+'</button></div>'
    +'<div id="stUres" style="margin-top:8px"></div>'
    +'<div class="sect" style="margin:16px 0 6px">'+esc(t("amount_optional"))+'</div>'
    +'<div class="paybox" style="margin:0">'
    +'<div class="row"><div class="l">'+esc(t("stars_amount_label"))+'</div></div>'
    +'<div class="amount"><input id="stAmt" type="number" min="'+minS+'" step="1" placeholder="0"><span class="cur">'+ic("star",13)+'</span></div>'
    +'<div class="row" style="border-top:1px dashed var(--line);margin-top:8px"><div class="l">'+esc(t("price_label"))+'</div><div class="r" id="stPrice">—</div></div>'
    +'<div class="minnote">1 '+ic("star",11)+' = '+esc(money(rate))+'</div>'
    +'<div class="minnote">'+esc(t("min_amount_note"))+': '+minS+' '+ic("star",11)+'</div>'
    +'</div>'
    +'<div style="height:12px"></div>'
    +'<button class="btn big" id="stBuy" disabled>'+esc(t("buy"))+'</button>'
    +'<div class="minnote" id="stBuyHint" style="text-align:center;margin-top:8px">'+esc(t("stars_hint_check"))+'</div>'
  );
  var checkedUser=null;
  function updatePrice(){
    var amt=Math.round(Number(sh.querySelector("#stAmt").value)||0);
    var price=amt*rate;
    sh.querySelector("#stPrice").textContent=amt>0?money(price):"—";
    var ok=checkedUser&&amt>=minS;
    sh.querySelector("#stBuy").disabled=!ok;
    var hint=sh.querySelector("#stBuyHint");
    if(ok)hint.style.display="none";
    else{
      hint.style.display="";
      hint.textContent=!checkedUser?t("stars_hint_check"):t("stars_hint_min").replace("{n}",minS);
    }
  }
  sh.querySelector("#stAmt").addEventListener("input",updatePrice);
  sh.querySelector("#stCheck").addEventListener("click",function(){
    var uname=sh.querySelector("#stU").value.trim().replace(/^@/,"");
    if(!uname)return;
    sh.querySelector("#stUres").innerHTML='<div class="paynote">'+esc(t("checking"))+'…</div>';
    api("/api/fragment/check-user","POST",{username:uname}).then(function(r){
      checkedUser=uname;
      var res=r.result||{};
      sh.querySelector("#stUres").innerHTML='<div class="refline">'+ic("check",14)+' '+esc(res.name||uname)+' (@'+esc(res.username||uname)+')'+(res.is_premium?(' '+ic("diamond",13)):'')+'</div>';
      updatePrice();
    }).catch(function(e){
      checkedUser=null;
      sh.querySelector("#stUres").innerHTML='<div class="paynote" style="color:var(--err)">'+ic("cross",13)+' '+esc(t("user_not_found"))+'</div>';
      updatePrice();
    });
  });
  sh.querySelector("#stBuy").addEventListener("click",function(){
    var amt=Math.round(Number(sh.querySelector("#stAmt").value)||0);
    if(!checkedUser||amt<minS)return;
    var btn=sh.querySelector("#stBuy");btn.disabled=true;btn.textContent=t("processing");
    api("/api/buy-stars-custom","POST",{itemId:it.id,username:checkedUser,amount:amt}).then(function(r){
      ME.balance=r.balance;haptic("ok");closeSheet();
      loadMe(function(){ if(r.order&&r.order.delivered){showDeliveredSheet(it,r.order);} go("orders"); });
    }).catch(function(e){
      btn.disabled=false;btn.textContent=t("buy");
      var msg=null;
      if(e.resp&&e.resp.error==="balance")msg=t("need_more");
      else if(e.resp&&e.resp.error==="min_amount")msg=t("min_amount_note")+": "+e.resp.min;
      else if(e.resp&&e.resp.error==="fragment_failed")msg=e.resp.message||t("fragment_err");
      else msg=t("srv_off");
      var note=sh.querySelector("#stBuyErr");
      if(!note){note=document.createElement("div");note.id="stBuyErr";note.className="paynote";note.style.color="var(--err)";btn.insertAdjacentElement("afterend",note);}
      note.innerHTML=ic("warning",13)+' '+esc(msg);
      haptic();
    });
  });
}

/* ===== buy from balance ===== */
function openBuyConfirm(it){
  var bal=ME.balance,price=it.price;
  var enough=bal!==null&&bal>=price;
  var sh=openSheet(
    tileHTML(it,true)
    +'<h2>'+esc(t("buy_confirm"))+'</h2>'
    +'<div class="refline"><span>'+esc(loc(it.title))+'</span><b>'+esc(money(price))+'</b></div>'
    +'<div class="refline"><span>'+esc(t("bal_title"))+'</span><b>'+(bal===null?"…":esc(money(bal)))+'</b></div>'
    +(enough?'<div class="refline"><span>'+esc(t("after_left"))+'</span><b>'+esc(money(bal-price))+'</b></div>':'')
    +'<div style="height:12px"></div>'
    +(enough
      ?'<button class="btn big green" id="doBuy">'+esc(t("pay_from_balance"))+'</button>'
      :'<div class="paynote">'+ic("warning",13)+' '+esc(t("need_more"))+'</div><button class="btn big" id="goTopup">'+ic("plus",15)+' '+esc(t("bal_topup"))+'</button>')
  );
  var b=sh.querySelector("#doBuy");
  if(b)b.addEventListener("click",function(){
    b.disabled=true;b.textContent=t("processing");
    api("/api/buy","POST",{itemId:it.id}).then(function(r){
      ME.balance=r.balance;haptic("ok");closeSheet();
      loadMe(function(){
        if(r.order&&r.order.delivered){showDeliveredSheet(it,r.order);}
        else{toast(t("bought_ok"));}
        go("orders");
      });
    }).catch(function(e){
      var code=e.resp&&e.resp.error;
      if(code==="balance"){closeSheet();toast(t("need_more"));go("pay");}
      else if(code==="out_of_stock"){closeSheet();toast(t("out_stock"));render();}
      else if(code==="no_username"){closeSheet();toast(t("need_username"));}
      else if(code==="fragment_failed"){closeSheet();toast((e.resp.message)||t("fragment_err"));}
      else{
        /* real network/server failure — keep the sheet open so the buyer can just retry, instead of losing context */
        b.disabled=false;b.textContent=t("pay_from_balance");
        var note=sh.querySelector("#doBuyErr");
        if(!note){note=document.createElement("div");note.id="doBuyErr";note.className="paynote";note.style.color="var(--err)";b.insertAdjacentElement("afterend",note);}
        note.innerHTML=ic("warning",13)+' '+esc(t("srv_off"));
        haptic();
      }
    });
  });
  var g=sh.querySelector("#goTopup");
  if(g)g.addEventListener("click",function(){
    var need=price-(bal||0);
    S.topup.amount=Math.max(MIN_AMOUNT,Math.ceil(need/1000)*1000);
    closeSheet();go("pay");
  });
}

var TOPUP_ERR=false;
function createTopup(){
  var el=document.getElementById("payAmount");
  var amount=Math.round(Number(el&&el.value)||0);
  if(!amount||amount<MIN_AMOUNT){toast(t("amount_low"));return;}
  if(!S.topup.method){toast(t("choose_method"));return;}
  if(S.topup.method==="bank"){
    var msg=t("bank_support_msg").replace("{amount}",money(amount));
    openLink("https://t.me/"+SUPPORT_USERNAME+"?text="+encodeURIComponent(msg));
    return;
  }
  TOPUP_ERR=false;
  var btn=document.getElementById("topupGo");
  if(btn){btn.disabled=true;btn.textContent=t("processing");}
  api("/api/topup","POST",{amount:amount,method:S.topup.method}).then(function(r){
    S.activePay={id:r.payment.id,pay:r.payment.pay,amount:r.payment.amount,method:r.payment.method,expiresAt:r.expiresAt};
    MARKPAID_ERR=false;
    persist();haptic("ok");toast(t("topup_created"));render();
  }).catch(function(){
    TOPUP_ERR=true;haptic();render();
  });
}
var MARKPAID_ERR=false;
function markPaid(){
  var ap=S.activePay;if(!ap)return;
  MARKPAID_ERR=false;
  var btn=document.getElementById("pwPaid");
  if(btn){btn.disabled=true;btn.textContent=t("processing");}
  api("/api/paid","POST",{id:ap.id}).then(function(){
    S.activePay=null;persist();haptic("ok");
    loadMe(function(){go("orders");});
  }).catch(function(e){
    var code=e.resp&&e.resp.error;
    if(code==="state"||code==="not found"){
      /* server already moved past "waiting" (e.g. admin already processed it) — safe to continue */
      S.activePay=null;persist();loadMe(function(){go("orders");});
      return;
    }
    /* real network/server failure — keep the payment window open so nothing gets lost silently */
    MARKPAID_ERR=true;haptic();render();
  });
}
function tickTimer(){
  var ap=S.activePay;if(!ap)return;
  var el=document.getElementById("pwTimer");
  var left=Math.floor((ap.expiresAt-Date.now())/1000);
  if(left<=0){
    S.activePay=null;persist();
    if(S.screen==="pay"){render();showExpiredSheet();}
    return;
  }
  if(el)el.textContent=("0"+Math.floor(left/60)).slice(-2)+":"+("0"+(left%60)).slice(-2);
}
function showExpiredSheet(){
  var sh=openSheet(
    '<h2>'+ic("clock",19)+' '+esc(t("pw_expired_title"))+'</h2>'
    +'<div class="desc">'+esc(t("pw_expired_body"))+'</div>'

  var b2=sh.querySelector("#pwExpSupport");
  if(b2)b2.addEventListener("click",function(){openLink("https://t.me/"+SUPPORT_USERNAME);});
}

function isCustom(id){for(var i=0;i<S.custom.length;i++)if(S.custom[i].id===id)return true;return false;}
function patchItem(id,patch){
  if(S.imported){for(var i=0;i<S.imported.length;i++)if(S.imported[i].id===id){for(var k in patch)S.imported[i][k]=patch[k];}return;}
  if(isCustom(id)){for(var j=0;j<S.custom.length;j++)if(S.custom[j].id===id){for(var k2 in patch)S.custom[j][k2]=patch[k2];}return;}
  var p=S.over[id]||{};for(var k3 in patch)p[k3]=patch[k3];S.over[id]=p;
}
function deleteItem(id){
  if(S.imported){S.imported=S.imported.filter(function(x){return x.id!==id;});return;}
  if(isCustom(id)){S.custom=S.custom.filter(function(x){return x.id!==id;});return;}
  if(S.removed.indexOf(id)===-1)S.removed.push(id);
}

<script>
"use strict";
/* ===== admin: guruhlar (mahsulotdan mustaqil boshqarish) ===== */
/* Bir kategoriya (kind) ichidagi barcha guruhlarni qaytaradi: mahsulotlarda
   ishlatilayotganlari + hali mahsuloti yo'q, lekin admin oldindan yaratib
   qo'ygan guruhlar (S.groupDefs). */
function adminGroupsOf(kind){
  var map={},order=[];
  var items=catalog().filter(function(x){return x.kind===kind&&x.group;});
  for(var i=0;i<items.length;i++){
    var key=items[i].group;
    if(!map[key]){map[key]={key:key,label:items[i].groupLabel||key,img:items[i].groupImg||""};order.push(key);}
  }
  var defs=S.groupDefs||[];
  for(var j=0;j<defs.length;j++){
    var d=defs[j];
    if(d.kind!==kind)continue;
    if(!map[d.key]){map[d.key]={key:d.key,label:d.label,img:d.img||""};order.push(d.key);}
  }
  return order.map(function(k){return map[k];});
}
function upsertGroupDef(kind,key,label,img){
  if(!kind||!key)return;
  var defs=S.groupDefs||(S.groupDefs=[]);
  for(var i=0;i<defs.length;i++){
    if(defs[i].kind===kind&&defs[i].key===key){defs[i].label=label;if(img)defs[i].img=img;return;}
  }
  defs.push({kind:kind,key:key,label:label,img:img||""});
}
function removeGroupDef(kind,key){
  S.groupDefs=(S.groupDefs||[]).filter(function(d){return !(d.kind===kind&&d.key===key);});
}
function renameGroupEverywhere(kind,key,newLabel,newImg){
  var c=catalog();
  for(var i=0;i<c.length;i++){
    if(c[i].kind===kind&&c[i].group===key)patchItem(c[i].id,{groupLabel:newLabel,groupImg:newImg});
  }
  upsertGroupDef(kind,key,newLabel,newImg);
}
function clearGroupEverywhere(kind,key){
  var c=catalog();
  for(var i=0;i<c.length;i++){
    if(c[i].kind===kind&&c[i].group===key)patchItem(c[i].id,{group:null,groupLabel:null,groupImg:null});
  }
  removeGroupDef(kind,key);
}
function slugifyGroupName(name){
  return name.trim().toLowerCase().replace(/[^a-z0-9а-яёʻʼ]+/gi,"_").replace(/^_+|_+$/g,"")||("g"+Date.now());

function openGroupForm(kind,key,parentSh){
  var existing=null;
  if(kind&&key){
    var list=adminGroupsOf(kind);
    for(var i=0;i<list.length;i++)if(list[i].key===key)existing=list[i];
  }
  var F={kind:kind||TABS[0][0],label:existing?existing.label:"",img:existing?existing.img:""};
  function kindBtn(k,lk){return '<button data-gkind="'+k+'" class="'+(F.kind===k?"on":"")+'">'+esc(t(lk))+'</button>';}
  var html='<h2>'+esc(existing?t("a_edit"):t("a_groups_new"))+'</h2>'
    +(existing?"":('<label>'+esc(t("a_section"))+'</label><div class="seg" id="gKindSeg">'+TABS.map(function(x){return kindBtn(x[0],x[1]);}).join("")+'</div>'))

    }).catch(function(){
      finishSave({uz:F.title,ru:F.title,en:F.title},{uz:F.duz,ru:F.duz,en:F.duz});
    });
    function finishSave(titleObj,descObj){
      var groupKey=F.group,groupLabel=F.groupLabel,groupImg=F.groupImg;
      if(groupKey==="__new__"){
        if(!F.groupLabel){toast(t("a_need"));saveBtn.disabled=false;saveBtn.textContent=origLabel;return;}
        groupKey=slugifyGroupName(F.groupLabel);
        groupLabel=F.groupLabel.trim();
      }
      if(groupKey&&groupKey!=="__new__")upsertGroupDef(F.kind,groupKey,groupLabel,groupImg);
      var data={
        kind:F.kind,cat:F.cat,price:Number(F.price),stock:Number(F.stock)||0,active:F.active,
        tile:{label:F.title,sub:"",bg:"#2b1a5e",fg:"#ffffff",img:F.img},
        title:titleObj,
        desc:descObj,
        note:F.note||"",
        group:groupKey||null,groupLabel:groupKey?groupLabel:null,groupImg:groupKey?groupImg:null,
        fulfill:null,starsAmount:null,premiumMonths:null,pricePerStar:null,minStars:null
      };
      if(F.fulfillType==="fragstars"){data.fulfill="fragment_stars";data.starsAmount=Number(F.starsAmount)||0;}
      else if(F.fulfillType==="fragpremium"){data.fulfill="fragment_premium";data.premiumMonths=Number(F.months)||3;}
      else if(F.fulfillType==="fragstarscustom"){data.fulfill="fragment_stars_custom";data.pricePerStar=Number(F.pricePerStar)||0;data.minStars=Number(F.minStars)||50;}
      if(F.id){patchItem(F.id,data);toast(t("a_saved"));}
      else{data.id="c"+Date.now();S.custom.push(data);toast(t("a_added"));}
      persist();haptic("ok");closeSheet();
      S.screen="home";S.tab=F.kind;render();
    }
  });
  if(editId){
    function reloadStk(){
      api("/api/admin/stock?itemId="+encodeURIComponent(editId)).then(function(r){
        g("#stkCount").textContent=r.count+" "+t("a_stock_unit");
      }).catch(function(){g("#stkCount").textContent="—";});
    }
    var sab=g("#stkAddBtn");
    if(sab)sab.addEventListener("click",function(){
      var txt=g("#f_stockadd").value;
      if(!txt.trim())return;
      api("/api/admin/stock/add","POST",{itemId:editId,text:txt}).then(function(r){
        g("#f_stockadd").value="";toast(t("a_stock_added"));haptic("ok");reloadStk();
      }).catch(function(){toast(t("srv_off"),true);});
    });
    var scb=g("#stkClearBtn");
    if(scb)scb.addEventListener("click",function(){
      api("/api/admin/stock/clear","POST",{itemId:editId}).then(function(){toast(t("a_stock_cleared"));haptic();reloadStk();})
        .catch(function(){toast(t("srv_off"),true);});
    });
    reloadStk();
  }
  preview();
}

  });
  els=document.querySelectorAll("[data-settheme]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){S.theme=this.getAttribute("data-settheme");Store.set("vn_theme",S.theme);haptic();render();});
  var invBtn=document.getElementById("inviteBtn");
  if(invBtn)invBtn.addEventListener("click",openReferralSheet);
  els=document.querySelectorAll("[data-openref]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",openReferralSheet);
  els=document.querySelectorAll("[data-chip]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    S.topup.amount=Number(this.getAttribute("data-chip"));haptic();render();
  });
  els=document.querySelectorAll("[data-method]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    var amtEl=document.getElementById("payAmount");
    if(amtEl)S.topup.amount=Math.round(Number(amtEl.value))||S.topup.amount;
    S.topup.method=this.getAttribute("data-method");haptic();render();
  });
  var tg1=document.getElementById("topupGo");
  if(tg1)tg1.addEventListener("click",createTopup);
  var pw=document.getElementById("pwPaid");
  if(pw)pw.addEventListener("click",markPaid);
  var pa=document.getElementById("pwAbort");
  if(pa)pa.addEventListener("click",function(){S.activePay=null;persist();toast(t("cancelled_toast"));render();});
  var ab=document.getElementById("adminBtnRow");
  if(ab)ab.addEventListener("click",openAdmin);
  tickTimer();
}

/* ===== boot ===== */
var StockCounts={};
var _stockCountsSig=""; // oxirgi olingan ma'lumot "izi" — o'zgarmagan bo'lsa qayta chizmaslik uchun
function loadStockCounts(){
  try{
    if(typeof fetch!=="function")return;
    fetch("/api/stock-counts",{cache:"no-store"}).then(function(r){return r.ok?r.json():null;})
    .then(function(j){
      if(!j)return;
      var sig=JSON.stringify(j);
      if(sig===_stockCountsSig)return; // hech narsa o'zgarmagan — qimmat to'liq render()ni tashlab yuboramiz
      _stockCountsSig=sig;
      StockCounts=j;
      if(S.lang)render();
    }).catch(function(){});
  }catch(e){}
}
var CatMeta={};
var _catMetaSig="";
function loadCatMeta(){
  try{
    if(typeof fetch!=="function")return;
    fetch("/api/category-meta").then(function(r){return r.ok?r.json():null;})
    .then(function(j){
      if(!j)return;
      var sig=JSON.stringify(j);
      if(sig===_catMetaSig)return; // rasm/nom o'zgarmagan — butun sahifani (barcha rasmlarni) qayta chizib CPU/animatsiyani "qotirmaymiz"
      _catMetaSig=sig;
      CatMeta=j;
      if(S.lang)render();
    }).catch(function(){});
  }catch(e){}
}
function boot(){
  render();
  loadServerCatalog();
  loadCatMeta();
  loadMe();
  loadStockCounts();
  loadReviews();
  loadLeaderboard();
  loadReferral();
  setInterval(tickTimer,1000);
  setInterval(rotateReviewWidget,4500);
  setInterval(function(){
    if(tgUser()&&(S.screen==="orders"||S.screen==="home"))loadMe();
    if(S.screen==="home")loadStockCounts();
    if(S.screen==="home"){loadReviews();loadLeaderboard();}
  },20000);
  setTimeout(function(){
    var sp=document.getElementById("splash");
    if(sp){sp.classList.add("off");setTimeout(function(){sp.remove();},500);}
  },700);
}
var _booted=false;
function bootOnce(){
  // "DOMContentLoaded" listener VA quyidagi darhol-tekshiruv ba'zan ikkalasi
  // ham ishga tushib qolishi mumkin (ayniqsa Telegram WebView sahifani
  // keshdan tiklaganda) — natijada boot() ikki marta chaqirilib,
  // setInterval(tickTimer)/setInterval(rotateReviewWidget)/20s so'rov
  // intervali har safar QO'SHIMCHA ro'yxatdan o'tib, soni ko'payib borardi.
  // Bu aynan sharhlar (Mijozlar fikri) blokining "qotishi" va ilovaning
  // umuman muzlab-qayta tiklanishiga sabab bo'lgan. Shu flag orqali
  // boot() umr bo'yi faqat bir marta ishga tushishini kafolatlaymiz.
  if(_booted)return;
  _booted=true;
  boot();
}
document.addEventListener("DOMContentLoaded",bootOnce);
if(document.readyState!=="loading")bootOnce();
</script>
